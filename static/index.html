<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TelecomLens</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"
  integrity="sha512-CQBWl4fJHWbryGE+Pc7UAxWMUMNMWzWxF4SQo9CgkJIN1kx6djDQZjh3Y8SZ1d+6I+1zze6Z7kHXO7q3UyZAWw=="
  crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<style>
:root{--bg:#f5f6f8;--bg2:#eef0f3;--bg3:#e3e6ea;--fg:#1c2333;--fg2:#4a5568;--fg3:#8896a7;--blue:#2563eb;--teal:#0d9488;--coral:#e53e3e;--amber:#d97706;--green:#16a34a;--purple:#7c3aed;--indigo:#4f46e5;--border:#dde1e7;--card:#ffffff;--radius:10px;--shadow:0 1px 3px rgba(0,0,0,.06);--shadow-md:0 4px 12px rgba(0,0,0,.08);--panel-w:440px}
@media(prefers-color-scheme:dark){:root{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--fg:#c9d1d9;--fg2:#8b949e;--fg3:#484f58;--border:#30363d;--card:#161b22}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--fg);font-size:13.5px;line-height:1.5;-webkit-font-smoothing:antialiased}
.hdr{background:var(--card);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:10px;height:50px;position:sticky;top:0;z-index:90}
.logo{font-weight:700;font-size:15px;letter-spacing:-.4px;background:linear-gradient(135deg,var(--blue),var(--indigo));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.hdr select{background:var(--bg2);border:1px solid var(--border);border-radius:7px;color:var(--fg);padding:5px 8px;font-size:12.5px;cursor:pointer;max-width:185px}
.hdr select:focus{outline:none;border-color:var(--blue)}
.hdr-sep{flex:1 1 0}
.hbtn{background:var(--bg2);border:1px solid var(--border);border-radius:7px;color:var(--fg2);padding:5px 11px;font-size:12px;cursor:pointer;white-space:nowrap;transition:background .12s;line-height:1.4}
.hbtn:hover{background:var(--bg3)}.hbtn:disabled{opacity:.5;cursor:default}
.hbtn.primary{background:var(--blue);color:#fff;border-color:transparent}.hbtn.primary:hover{background:#1d4ed8}
.hbtn.danger{background:#fee2e2;color:var(--coral);border-color:#fca5a5}.hbtn.danger:hover{background:#fecaca}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--fg3);font-size:16px;padding:5px 7px;border-radius:6px;line-height:1;transition:background .12s,color .12s}
.icon-btn:hover{background:var(--bg2);color:var(--fg)}
.tabs{background:var(--card);border-bottom:1px solid var(--border);padding:0 20px;display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 15px;font-size:13px;font-weight:500;color:var(--fg3);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s;user-select:none}
.tab:hover{color:var(--fg)}.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.page{max-width:1280px;margin:0 auto;padding:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:14px;box-shadow:var(--shadow)}
.card-title{font-size:12px;font-weight:600;color:var(--fg3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card-title .edit-btn{background:none;border:none;cursor:pointer;color:var(--fg3);font-size:11px;padding:0;opacity:0;transition:opacity .15s}
.card-title:hover .edit-btn{opacity:1}
.g4{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:14px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:14px}
@media(max-width:800px){.g2,.g3{grid-template-columns:1fr}}
.kpi{background:var(--bg2);border-radius:var(--radius);padding:14px 16px;cursor:pointer;transition:background .12s,box-shadow .12s;border:1.5px solid transparent;position:relative}
.kpi:hover{background:var(--bg3);box-shadow:var(--shadow-md)}
.kpi-label{font-size:11px;color:var(--fg3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.kpi-value{font-size:23px;font-weight:700;color:var(--fg);line-height:1.15}
.kpi-sub{font-size:11px;color:var(--fg3);margin-top:3px}
.kpi-hint{position:absolute;top:9px;right:10px;font-size:10px;color:var(--blue);opacity:0;transition:opacity .15s}
.kpi:hover .kpi-hint{opacity:1}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:7px 10px;font-size:11px;font-weight:600;color:var(--fg3);border-bottom:2px solid var(--border);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
tr.clickable{cursor:pointer;transition:background .1s}
tr.clickable:hover td{background:var(--bg2)}
tr.anom td{background:#fff5f5}
@media(prefers-color-scheme:dark){tr.anom td{background:#2d1515}}
.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500;white-space:nowrap}
.b-blue{background:#dbeafe;color:#1e40af}.b-green{background:#d1fae5;color:#065f46}
.b-red{background:#fee2e2;color:#991b1b}.b-amber{background:#fef3c7;color:#92400e}
.b-gray{background:var(--bg3);color:var(--fg3)}.b-purple{background:#ede9fe;color:#5b21b6}
@media(prefers-color-scheme:dark){.b-blue{background:#1e3a5f;color:#93c5fd}.b-green{background:#14532d;color:#86efac}.b-red{background:#450a0a;color:#fca5a5}.b-amber{background:#451a03;color:#fcd34d}.b-purple{background:#2e1065;color:#c4b5fd}}
.ch{position:relative;width:100%;height:220px}
.ch-tall{position:relative;width:100%;height:280px}
.ch-sm{position:relative;width:100%;height:90px}
.subtabs{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.stab{padding:5px 13px;font-size:12px;font-weight:500;color:var(--fg3);background:var(--bg2);border:1px solid var(--border);border-radius:7px;cursor:pointer;transition:all .12s}
.stab:hover{color:var(--fg);border-color:var(--blue)}.stab.active{background:var(--blue);color:#fff;border-color:transparent}
.search-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.search-bar input,.search-bar select{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:7px 12px;color:var(--fg);font-size:13px}
.search-bar input{flex:1;min-width:180px}
.search-bar input:focus,.search-bar select:focus{outline:none;border-color:var(--blue)}
.prog-bar{height:5px;background:var(--bg3);border-radius:99px;overflow:hidden;margin:6px 0}
.prog-fill{height:100%;background:var(--blue);border-radius:99px;transition:width .35s ease}
#drill-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.2)}
#drill-overlay.open{display:block}
#drill-panel{position:fixed;right:0;top:0;bottom:0;width:var(--panel-w);background:var(--card);border-left:1px solid var(--border);z-index:201;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .22s cubic-bezier(.4,0,.2,1)}
#drill-panel.open{transform:translateX(0)}
#hist-overlay{display:none;position:fixed;inset:0;z-index:202;background:rgba(0,0,0,.2)}
#hist-overlay.open{display:block}
#hist-panel{position:fixed;right:0;top:0;bottom:0;width:var(--panel-w);background:var(--card);border-left:1px solid var(--border);z-index:203;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .22s cubic-bezier(.4,0,.2,1)}
#hist-panel.open{transform:translateX(0)}
.ev-row{display:flex;gap:8px;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--border)}
.ev-row:last-child{border-bottom:none}
.dp-head{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.dp-title{flex:1;font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dp-close{background:none;border:none;cursor:pointer;font-size:17px;color:var(--fg3);padding:2px 5px}
.dp-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:11px 16px;border-bottom:1px solid var(--border)}
.dp-stat-val{font-size:18px;font-weight:700;text-align:center}
.dp-stat-lbl{font-size:10px;color:var(--fg3);text-align:center;text-transform:uppercase;letter-spacing:.4px}
.dp-body{flex:1;overflow-y:auto}.dp-section{padding:10px 16px 0}
.dp-section-title{font-size:11px;font-weight:600;color:var(--fg3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.dp-footer{padding:10px 16px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0}
.dp-tbl{width:100%;border-collapse:collapse;font-size:12px}
.dp-tbl th{padding:5px 8px;font-size:10px;color:var(--fg3);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.4px;font-weight:600;text-align:left}
.dp-tbl td{padding:5px 8px;border-bottom:1px solid var(--border);vertical-align:middle}
.dp-tbl tr.anom td{background:#fff5f5}.dp-tbl tr:hover td{background:var(--bg2);cursor:pointer}
.top3-bar{height:4px;background:var(--bg3);border-radius:2px;margin-top:3px}
.top3-fill{height:4px;background:var(--blue);border-radius:2px;transition:width .4s}
#settings-overlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.25)}
#settings-overlay.open{display:block}
#settings-drawer{position:fixed;right:0;top:0;bottom:0;width:380px;background:var(--card);border-left:1px solid var(--border);z-index:301;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .22s cubic-bezier(.4,0,.2,1)}
#settings-drawer.open{transform:translateX(0)}
.sd-head{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.sd-title{flex:1;font-size:14px;font-weight:600}
.sd-body{flex:1;overflow-y:auto;padding:14px}.sd-section{margin-bottom:16px}
.sd-section-title{font-size:11px;font-weight:600;color:var(--fg3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px}
.sd-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.sd-row label{flex:0 0 150px;font-size:12px;color:var(--fg2)}
.sd-row input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:12px;color:var(--fg)}
.sd-row input:focus{outline:none;border-color:var(--blue)}
.sd-footer{padding:10px 16px;border-top:1px solid var(--border);display:flex;gap:8px}
#import-overlay{display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.55);align-items:center;justify-content:center;flex-direction:column}
#import-overlay.active{display:flex}
.import-card{background:var(--card);border-radius:14px;padding:28px 32px;min-width:340px;text-align:center;box-shadow:var(--shadow-md)}
.modal-overlay{position:fixed;inset:0;z-index:450;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center}
.modal{background:var(--card);border-radius:var(--radius);padding:20px;width:500px;max-width:95vw;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-md)}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.modal-title{font-size:15px;font-weight:600}
.field-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:10px}
.field-row label{flex:0 0 130px;font-size:12px;color:var(--fg2);padding-top:7px}
.field-row input,.field-row select,.field-row textarea{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:6px 9px;font-size:12.5px;color:var(--fg)}
.field-row input:focus,.field-row select:focus,.field-row textarea:focus{outline:none;border-color:var(--blue)}
.field-row textarea{resize:vertical;min-height:60px}
.empty{text-align:center;padding:40px 16px;color:var(--fg3);font-size:13px}
.spinner{width:22px;height:22px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:32px auto;display:block}
@keyframes spin{to{transform:rotate(360deg)}}
.tag-chip{display:inline-block;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:3px 10px;font-size:11px;margin:2px;cursor:pointer;transition:border-color .12s}
.tag-chip:hover{border-color:var(--blue)}
.clr-dot{width:11px;height:11px;border-radius:50%;display:inline-block;margin-right:5px;vertical-align:middle;border:1px solid rgba(0,0,0,.1)}
</style></head>
<body>
<div class="hdr">
  <span class="logo">📡 TelecomLens</span>
  <select id="org-select" onchange="onOrgChange(this.value)" title="Organisation"></select>
  <select id="bill-select" onchange="onBillChange(this.value)" title="Bill"></select>
  <span class="hdr-sep"></span>
  <button class="hbtn" onclick="openImport()">⊕ Import</button>
  <button class="hbtn" id="reclassify-btn" onclick="reclassifyBill()" style="display:none" title="Re-run classification">🔄</button>
  <button class="icon-btn" onclick="openSettings()" title="Customise labels">⚙</button>
  <span id="res-indicator" style="font-size:11px;color:var(--fg3)" title="System resources"></span>
  <button class="hbtn danger" onclick="confirmStop()">⏹ Stop</button>
</div>
<div class="tabs" id="tabs-bar"></div>
<div class="page" id="main-content"><div class="spinner"></div></div>
<div id="drill-overlay" onclick="closeDrill()"></div>
<div id="drill-panel">
  <div class="dp-head"><span class="dp-title" id="drill-title">Detail</span><button class="dp-close" onclick="closeDrill()">✕</button></div>
  <div class="dp-stats" id="drill-stats"></div>
  <div id="drill-spark" style="display:none;padding:10px 16px;border-bottom:1px solid var(--border)">
    <div style="font-size:11px;font-weight:600;color:var(--fg3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px">Trend history</div>
    <div class="ch-sm"><canvas id="drill-spark-canvas"></canvas></div>
  </div>
  <div class="dp-body" id="drill-body"></div>
  <div class="dp-footer" id="drill-footer"></div>
</div>
<div id="hist-overlay" onclick="closeSubHistory()"></div>
<div id="hist-panel">
  <div class="dp-head"><span class="dp-title" id="hist-title">Subscriber history</span><button class="dp-close" onclick="closeSubHistory()">✕</button></div>
  <div class="dp-stats" id="hist-stats"></div>
  <div id="hist-chart-wrap" style="display:none;padding:10px 16px;border-bottom:1px solid var(--border)">
    <div style="font-size:11px;font-weight:600;color:var(--fg3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px">Monthly spend (KES)</div>
    <div class="ch-sm"><canvas id="hist-chart-canvas"></canvas></div>
  </div>
  <div class="dp-body" id="hist-body"></div>
  <div class="dp-footer" id="hist-footer"></div>
</div>
<div id="settings-overlay" onclick="closeSettings()"></div>
<div id="settings-drawer">
  <div class="sd-head"><span class="sd-title">⚙ Customise Labels</span><button class="dp-close" onclick="closeSettings()">✕</button></div>
  <div class="sd-body" id="settings-body"></div>
  <div class="sd-footer">
    <button class="hbtn primary" onclick="saveSettings()" style="flex:1">Save</button>
    <button class="hbtn" onclick="resetSettings()">Reset defaults</button>
  </div>
</div>
<div id="import-overlay">
  <div class="import-card">
    <div style="font-size:30px;margin-bottom:10px">📡</div>
    <div style="font-size:15px;font-weight:600;margin-bottom:5px" id="imp-title">Importing…</div>
    <div style="font-size:12px;color:var(--fg3);margin-bottom:14px" id="imp-status">Reading PDF</div>
    <div class="prog-bar"><div class="prog-fill" id="imp-bar" style="width:0%"></div></div>
    <div style="font-size:11px;color:var(--fg3);margin-top:6px" id="imp-detail"></div>
  </div>
</div>
<script>
const S={activeOrgId:null,activeBillId:null,activeTab:'overview',summary:null,divisions:[],allBills:[],trends:[],topSpenders:[],orgDivisions:[],subscribers:{total:0,profiles:[]},tags:[],lifecycle:{events:[],summary:{}},budgetVsActual:[],forecast:null,alertBreaches:[],alerts:[],annotations:[],auditLog:[],webhooks:[],carriers:[],changes:[],searchTimer:null,waste:null,charts:{}};
const _drillCache=new Map();let _drillCacheKey=0,_drillSpark=null;

// LABELS
const DEFAULT_LABELS={'tab.overview':'Overview','tab.finance':'Finance','tab.subscribers':'Subscribers','tab.divisions':'Divisions','tab.analytics':'Analytics','tab.settings':'Settings','kpi.total_spend':'Total Spend','kpi.subscribers':'Subscribers','kpi.anomalies':'Anomalies','kpi.outstanding':'Outstanding','kpi.pre_tax':'Pre-Tax Total','kpi.excise':'Excise Duty','kpi.vat':'VAT','sec.division_breakdown':'Spend by Division','sec.charge_components':'Charge Components','sec.tax_recon':'Tax Reconciliation','sec.chargeback':'Chargeback Register','sec.anomalies':'Anomaly Tracker','sec.trend':'Spend Trend','sec.budget_vs_actual':'Budget vs Actual','sec.forecast':'Forecast','sec.alerts':'Spend Alerts','sec.benchmarks':'Cost-per-Head','sec.export':'Export','sec.annotations':'Annotations','sec.audit':'Audit Trail','sec.webhooks':'Webhooks','sec.div_manager':'Division Manager','sec.retag':'Bulk Retag','sec.changes':'Change Log'};
const LABEL_GROUPS=[{g:'Tabs',keys:['tab.overview','tab.finance','tab.subscribers','tab.divisions','tab.analytics','tab.settings']},{g:'KPI Cards',keys:['kpi.total_spend','kpi.subscribers','kpi.anomalies','kpi.outstanding','kpi.pre_tax','kpi.excise','kpi.vat']},{g:'Section Headings',keys:['sec.division_breakdown','sec.charge_components','sec.tax_recon','sec.chargeback','sec.anomalies','sec.trend','sec.budget_vs_actual','sec.forecast','sec.alerts','sec.benchmarks','sec.export','sec.annotations','sec.audit','sec.webhooks','sec.div_manager','sec.retag','sec.changes']}];
function loadLabels(){try{return{...DEFAULT_LABELS,...JSON.parse(localStorage.getItem('tl_labels')||'{}')};}catch{return{...DEFAULT_LABELS};}}
function lbl(k){return loadLabels()[k]||DEFAULT_LABELS[k]||k;}
function openSettings(){const labels=loadLabels();document.getElementById('settings-body').innerHTML=LABEL_GROUPS.map(g=>`<div class="sd-section"><div class="sd-section-title">${g.g}</div>${g.keys.map(k=>`<div class="sd-row"><label>${DEFAULT_LABELS[k]}</label><input data-key="${k}" value="${escH(labels[k]||DEFAULT_LABELS[k])}"></div>`).join('')}</div>`).join('');document.getElementById('settings-overlay').classList.add('open');document.getElementById('settings-drawer').classList.add('open');}
function closeSettings(){document.getElementById('settings-overlay').classList.remove('open');document.getElementById('settings-drawer').classList.remove('open');}
function saveSettings(){const labels={};document.querySelectorAll('#settings-body input[data-key]').forEach(inp=>{if(inp.value.trim())labels[inp.dataset.key]=inp.value.trim();});localStorage.setItem('tl_labels',JSON.stringify(labels));closeSettings();renderTabs();renderTab(S.activeTab);}
function resetSettings(){if(!confirm('Reset all labels to defaults?'))return;localStorage.removeItem('tl_labels');closeSettings();renderTabs();renderTab(S.activeTab);}
function promptRename(key){const cur=lbl(key),val=prompt('Rename "'+cur+'" to:',cur);if(val&&val.trim()){const labels=loadLabels();labels[key]=val.trim();localStorage.setItem('tl_labels',JSON.stringify(labels));renderTabs();renderTab(S.activeTab);}}
function secTitle(key){return escH(lbl(key))+' <button class="edit-btn" onclick="event.stopPropagation();promptRename(\''+key+'\')" title="Rename">✎</button>';}

// API HELPERS
async function apiFetch(url){try{const r=await fetch(url);if(!r.ok)return null;return await r.json();}catch{return null;}}
async function apiPost(url,body){try{const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});return await r.json();}catch{return null;}}
async function apiPatch(url,body){try{const r=await fetch(url,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});return await r.json();}catch{return null;}}
async function apiDel(url){try{const r=await fetch(url,{method:'DELETE'});return await r.json();}catch{return null;}}

// DATA LOADERS
async function loadOrgs(){const orgs=await apiFetch('/api/orgs')||[];const sel=document.getElementById('org-select');sel.innerHTML='<option value="">All orgs</option>';orgs.forEach(o=>sel.insertAdjacentHTML('beforeend',`<option value="${escH(o.id)}">${escH(o.name||o.id)}</option>`));if(orgs.length===1){sel.value=orgs[0].id;S.activeOrgId=orgs[0].id;}}
async function loadBills(orgId){const bills=await apiFetch('/api/bills'+(orgId?'?org_id='+orgId:''))||[];S.allBills=bills;const sel=document.getElementById('bill-select');sel.innerHTML='<option value="">Select bill…</option>';bills.forEach(b=>sel.insertAdjacentHTML('beforeend',`<option value="${b.id}">${escH(b.statement_date||b.filename)}</option>`));if(bills.length&&!S.activeBillId){sel.value=bills[0].id;S.activeBillId=bills[0].id;}else if(S.activeBillId){sel.value=S.activeBillId;}else{S.activeBillId=null;}}
async function loadBillData(billId){[S.summary,S.divisions]=await Promise.all([apiFetch('/api/bills/'+billId+'/summary'),apiFetch('/api/bills/'+billId+'/divisions')]);const rb=document.getElementById('reclassify-btn');if(rb)rb.style.display=S.summary?'':'none';
  // Ensure activeOrgId is always populated when we have a bill loaded
  if(!S.activeOrgId&&S.allBills.length){
    const bill=S.allBills.find(b=>b.id===billId)||S.allBills[0];
    if(bill){S.activeOrgId=bill.org_id;const sel=document.getElementById('org-select');if(sel)sel.value=bill.org_id;}

// TAB DISPATCH
function renderTab(tab){
  destroyCharts();

async function debounceSubSearch(q){clearTimeout(S.searchTimer);S.searchTimer=setTimeout(async()=>{if(!S.activeOrgId)return;const div=document.getElementById('sreg-div')?.value||'';const d=await apiFetch('/api/orgs/'+S.activeOrgId+'/subscribers?limit=100&search='+encodeURIComponent(q)+'&division='+encodeURIComponent(div));if(d){S.subscribers=d;const tb=document.getElementById('sreg-tbody');if(tb)tb.innerHTML=d.profiles.map(p=>subRow(p)).join('');}},300);}
async function filterSubDiv(div){if(!S.activeOrgId)return;const q=document.getElementById('sreg-q')?.value||'';const d=await apiFetch('/api/orgs/'+S.activeOrgId+'/subscribers?limit=100&search='+encodeURIComponent(q)+'&division='+encodeURIComponent(div));if(d){S.subscribers=d;const tb=document.getElementById('sreg-tbody');if(tb)tb.innerHTML=d.profiles.map(p=>subRow(p)).join('');}}
async function filterSubTag(tag){if(!S.activeOrgId)return;const d=await apiFetch('/api/orgs/'+S.activeOrgId+'/subscribers?limit=100&tag='+encodeURIComponent(tag));if(d){S.subscribers=d;renderSubRegistry();}}
function openSubEditor(subNum){const p=S.subscribers.profiles.find(x=>x.subscriber_number===subNum)||{};const divOpts=(S.orgDivisions||[]).map(d=>`<option value="${escH(d.name)}">${escH(d.name)}</option>`).join('');showModal('Edit Subscriber — '+escH(subNum),`<div class="field-row"><label>Display Name</label><input id="se-name" value="${escH(p.display_name||'')}"></div><div class="field-row"><label>Division</label><input id="se-div" list="se-div-list" value="${escH(p.division_override||p.division||'')}"><datalist id="se-div-list">${divOpts}</datalist></div><div class="field-row"><label>Tags</label><input id="se-tags" value="${escH(p.tags||'')}" placeholder="comma-separated"></div><div class="field-row"><label>Device Type</label><select id="se-device">${['','Handset','SIM Card','Modem / Dongle','Fixed Line','Shared Pool','IoT / M2M'].map(o=>`<option value="${o}" ${(p.device_type||'')===o?'selected':''}>${o||'— Not set —'}</option>`).join('')}</select></div><div class="field-row"><label>Expected Tariff</label><input id="se-tariff" value="${escH(p.tariff_override||'')}"></div><div class="field-row"><label>Notes</label><input id="se-notes" value="${escH(p.notes||'')}"></div>`,'saveSubEdit(\''+escH(subNum)+'\')');}
async function saveSubEdit(subNum){const body={display_name:document.getElementById('se-name')?.value.trim(),division_override:document.getElementById('se-div')?.value.trim(),tags:document.getElementById('se-tags')?.value.trim(),device_type:document.getElementById('se-device')?.value,tariff_override:document.getElementById('se-tariff')?.value.trim(),notes:document.getElementById('se-notes')?.value.trim()};await apiPatch('/api/orgs/'+S.activeOrgId+'/subscribers/'+encodeURIComponent(subNum),body);closeModal();await loadSubscriberData();}
function openBulkTagger(){const tag=prompt('Tag to apply to all filtered subscribers:','');if(!tag||!tag.trim())return;const profiles=S.subscribers.profiles||[];if(!profiles.length){alert('No subscribers in current view.');return;}if(!confirm('Apply tag "'+tag.trim()+'" to '+profiles.length+' subscribers?'))return;Promise.all(profiles.map(p=>{const ex=(p.tags||'').split(',').map(t=>t.trim()).filter(Boolean);if(ex.includes(tag.trim()))return Promise.resolve();return apiPatch('/api/orgs/'+S.activeOrgId+'/subscribers/'+encodeURIComponent(p.subscriber_number),{tags:[...ex,tag.trim()].join(', ')});})).then(()=>loadSubscriberData());}
function exportSubCSV(){const p=S.subscribers.profiles||[];if(!p.length){alert('No data.');return;}const rows=[['Number','Name','Division','Tags','Device','Latest KES','First Seen','Last Seen']];p.forEach(x=>rows.push([x.subscriber_number,x.display_name,x.division,x.tags,x.device_type,x.latest_amount_kes,x.first_seen_date,x.last_seen_date]));downloadCSV(rows,'subscribers.csv');}

// DIVISIONS TAB
function renderDivisionsPage(){return `<div class="subtabs" id="div-subtabs"><button class="stab active" onclick="switchDivTab('manager',this)">Division Manager</button><button class="stab" onclick="switchDivTab('retag',this)">Bulk Retag</button><button class="stab" onclick="switchDivTab('changes',this)">Change Log</button></div><div id="div-content"><div class="spinner"></div></div>`;}
let _divTab='manager';
function switchDivTab(tab,btn){_divTab=tab;document.querySelectorAll('#div-subtabs .stab').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');renderDivTab();}
async function loadDivisionsData(){
  if(!S.activeOrgId&&S.allBills.length){S.activeOrgId=S.allBills[0].org_id;}
  if(!S.activeOrgId){showTabEmpty('div-content','Import a bill first.');return;}const[divs,changes]=await Promise.all([apiFetch('/api/orgs/'+S.activeOrgId+'/divisions'),apiFetch('/api/orgs/'+S.activeOrgId+'/changes?limit=100')]);S.orgDivisions=divs||[];S.changes=changes||[];renderDivTab();}
function renderDivTab(){if(_divTab==='manager')renderDivManager();else if(_divTab==='retag')renderRetag();else renderChanges();}

function renderDivManager(){const el=document.getElementById('div-content');if(!el)return;const divs=S.orgDivisions||[];el.innerHTML=`<div class="card"><div class="card-title" style="display:flex;justify-content:space-between"><span>Division Manager (${divs.length})</span><button class="hbtn primary" onclick="openCreateDiv()">+ New Division</button></div><p style="font-size:12px;color:var(--fg3);margin-bottom:12px">Rename cascades across all bills. Delete only removes from registry — existing line assignments are kept.</p>${divs.length?`<div class="tbl-wrap"><table><thead><tr><th>Division</th><th>Colour</th><th>Description</th><th></th></tr></thead><tbody>${divs.map(d=>`<tr><td><span class="clr-dot" style="background:${escH(d.colour||'#8896a7')}"></span><strong>${escH(d.name)}</strong></td><td><input type="color" value="${escH(d.colour||'#8896a7')}" style="width:32px;height:24px;border:none;background:none;cursor:pointer;padding:0" onchange="updateDivColour(${d.id},'${escH(d.name)}',this.value)"></td><td style="color:var(--fg3);font-size:12px">${escH(d.description||'—')}</td><td style="display:flex;gap:5px"><button class="hbtn" style="padding:3px 8px;font-size:11px" onclick="openRenameDiv(${d.id},'${escH(d.name)}')">Rename</button><button class="hbtn" style="padding:3px 8px;font-size:11px;color:var(--coral)" onclick="deleteDiv(${d.id},'${escH(d.name)}')">Delete</button></td></tr>`).join('')}</tbody></table></div>`:`<div class="empty">No divisions registered. Import a bill to auto-populate.</div>`}</div>`;}
function openCreateDiv(){showModal('New Division','<div class="field-row"><label>Name</label><input id="nd-name" placeholder="e.g. IT Department"></div><div class="field-row"><label>Description</label><input id="nd-desc" placeholder="Optional"></div><div class="field-row"><label>Colour</label><input type="color" id="nd-colour" value="#2563eb" style="width:48px;height:32px;border:none;cursor:pointer;padding:0;background:none"></div>','createDiv()');}
async function createDiv(){const name=document.getElementById('nd-name')?.value.trim();if(!name){alert('Name is required.');return;}await apiPost('/api/orgs/'+S.activeOrgId+'/divisions',{name,description:document.getElementById('nd-desc')?.value.trim()||'',colour:document.getElementById('nd-colour')?.value||''});closeModal();await loadDivisionsData();}
function openRenameDiv(id,oldName){showModal('Rename Division','<div class="field-row"><label>Current Name</label><input value="'+escH(oldName)+'" disabled style="opacity:.6"></div><div class="field-row"><label>New Name</label><input id="rd-name" value="'+escH(oldName)+'" placeholder="New name"></div><div class="field-row"><label>Description</label><input id="rd-desc" placeholder="Optional description"></div>','renameDiv('+id+')');}
async function renameDiv(id){const name=document.getElementById('rd-name')?.value.trim();if(!name){alert('Name is required.');return;}const desc=document.getElementById('rd-desc')?.value.trim();await apiPatch('/api/orgs/'+S.activeOrgId+'/divisions/'+id,desc?{name,description:desc}:{name});closeModal();await loadDivisionsData();if(S.activeBillId)await loadBillData(S.activeBillId);if(S.activeTab==='overview'||S.activeTab==='finance')renderTab(S.activeTab);}
async function updateDivColour(id,name,colour){await apiPatch('/api/orgs/'+S.activeOrgId+'/divisions/'+id,{colour});}
async function deleteDiv(id,name){if(!confirm('Remove "'+name+'" from registry?\nExisting line assignments are kept.'))return;await apiDel('/api/orgs/'+S.activeOrgId+'/divisions/'+id);await loadDivisionsData();}

// BULK RETAG
let _retagPreview=null;
function renderRetag(){const el=document.getElementById('div-content');if(!el)return;const divOpts=(S.orgDivisions||[]).map(d=>`<option value="${escH(d.name)}">${escH(d.name)}</option>`).join('');el.innerHTML=`<div class="g2"><div class="card"><div class="card-title">Bulk Retag</div><p style="font-size:12px;color:var(--fg3);margin-bottom:14px">Search for lines by name, number, or tariff. Filter by current division. Preview, then apply. All changes are logged and reversible.</p><div style="display:flex;flex-direction:column;gap:10px"><div class="field-row" style="margin:0"><label>Search term</label><input id="rt-search" placeholder="Name (partial) or exact number…" oninput="debounceRetagPreview()" title="Name/tariff: partial match. Phone number (7+ digits): exact match"></div><div class="field-row" style="margin:0"><label>Current division</label><select id="rt-from"><option value="">Any division</option>${divOpts}</select></div><div class="field-row" style="margin:0"><label>Bill scope</label><select id="rt-bill"><option value="">All bills</option>'+(S.allBills||[]).map(b=>'<option value="'+b.id+'"'+(b.id===S.activeBillId?' selected':'')+'>'+escH(b.statement_date||b.filename)+'</option>').join('')+'</select></div><div class="field-row" style="margin:0"><label>Move to division</label><div style="display:flex;gap:6px;flex:1"><select id="rt-to-sel" onchange="if(this.value&&this.value!='__new__')document.getElementById('rt-to').value=this.value" style="flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:6px 9px;font-size:12px;color:var(--fg)"><option value="">— existing division —</option>${divOpts}<option value="__new__">＋ New…</option></select><input id="rt-to" placeholder="or type new name" style="flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:6px 9px;font-size:12px;color:var(--fg)"></div></div><div class="field-row" style="margin:0"><label>Reason / note</label><input id="rt-note" placeholder="Why are you making this change?"></div><div style="display:flex;gap:8px;margin-top:4px"><button class="hbtn" onclick="previewRetag()" style="flex:1">Preview</button><button class="hbtn primary" id="rt-apply-btn" onclick="applyRetag()" style="flex:1">Apply Changes</button></div></div></div><div class="card" id="retag-preview-card"><div class="card-title">Preview</div><div id="retag-preview-body" class="empty">Fill in filters above and click Preview.</div></div></div>`;}
function debounceRetagPreview(){clearTimeout(S.searchTimer);S.searchTimer=setTimeout(previewRetag,500);}
async function previewRetag(){const search=document.getElementById('rt-search')?.value.trim()||'';const from=document.getElementById('rt-from')?.value||'';const billId=document.getElementById('rt-bill')?.value||'';if(!search&&!from){document.getElementById('retag-preview-body').innerHTML='<div class="empty">Enter a search term or select a division.</div>';return;}const params=new URLSearchParams({search,from_division:from});if(billId)params.set('bill_id',billId);const data=await apiFetch('/api/orgs/'+S.activeOrgId+'/retag-preview?'+params);_retagPreview=data;const el=document.getElementById('retag-preview-body');if(!el)return;if(!data||!data.lines.length){el.innerHTML='<div class="empty">No matching lines found.</div>';return;}el.innerHTML=`<div style="font-size:12px;color:var(--fg3);margin-bottom:8px"><strong>${data.count}</strong> lines match — select a target division and click Apply</div><div class="tbl-wrap"><table><thead><tr><th>Name</th><th>Number</th><th>Current Division</th><th style="text-align:right">KES</th></tr></thead><tbody>${data.lines.map(l=>`<tr><td style="font-size:12px;font-weight:500">${escH(l.raw_name)}</td><td style="font-size:11px;color:var(--fg3)">${escH(l.subscriber_number)}</td><td><span class="badge b-blue" style="font-size:10px">${escH(l.division)}</span></td><td style="text-align:right;font-size:12px">${fmtN(l.amount_due_kes)}</td></tr>`).join('')}</tbody></table></div>`;}
async function applyRetag(){const newDiv=document.getElementById('rt-to')?.value.trim();if(!newDiv){alert('Enter a target division name.');return;}const search=document.getElementById('rt-search')?.value.trim()||'';const from=document.getElementById('rt-from')?.value||'';const billId=document.getElementById('rt-bill')?.value||'';const note=document.getElementById('rt-note')?.value.trim()||'';if(!search&&!from){alert('Enter a search term or select a current division.');return;}const affected=_retagPreview?.count||0;if(!confirm('Move '+affected+' matching line(s) to "'+newDiv+'"?\nThis is logged and reversible from the Change Log.'))return;const btn=document.getElementById('rt-apply-btn');if(btn){btn.innerHTML='Applying…';btn.disabled=true;}const body={new_division:newDiv,search,from_division:from,note};if(billId)body.bill_id=parseInt(billId);const result=await apiPost('/api/orgs/'+S.activeOrgId+'/retag',body);if(btn){btn.innerHTML='Apply Changes';btn.disabled=false;}if(result){alert('Done! '+result.changed_lines+' lines moved to "'+newDiv+'".');await loadDivisionsData();if(S.activeBillId)await loadBillData(S.activeBillId);_retagPreview=null;const el=document.getElementById('retag-preview-body');if(el)el.innerHTML='<div class="empty">Applied. Run another search to continue.</div>';}}

// CHANGE LOG
function renderChanges(){const el=document.getElementById('div-content');if(!el)return;const changes=S.changes||[];el.innerHTML=`<div class="card"><div class="card-title" style="display:flex;justify-content:space-between"><span>Change Log (${changes.length})</span><div style="display:flex;gap:6px"><button class="hbtn" onclick="loadMoreChanges()">Load more</button><button class="hbtn" id="rollback-sel-btn" onclick="rollbackSelected()" style="display:none">↩ Rollback selected</button></div></div>${changes.length?`<p style="font-size:12px;color:var(--fg3);margin-bottom:10px">Tick changes to undo. Rollback restores the previous value across all bills.</p><div class="tbl-wrap"><table><thead><tr><th><input type="checkbox" id="chk-all" onchange="toggleAllChanges(this.checked)"></th><th>Subscriber</th><th>Field</th><th>Previous</th><th>New Value</th><th>Note</th><th>When</th><th></th></tr></thead><tbody>${changes.map(c=>`<tr><td>${c.rolled_back?'<span style="color:var(--fg3);font-size:11px">↩</span>':`<input type="checkbox" class="chg-chk" data-id="${c.id}" onchange="updateRollbackBtn()">`}</td><td style="font-size:12px"><div style="font-weight:500">${escH(c.entity_id)}</div><div style="font-size:10px;color:var(--fg3)">${escH(c.entity_type)}.${escH(c.field)}</div></td><td><span class="badge b-gray" style="font-size:10px">${escH(c.field)}</span></td><td style="font-size:12px;color:var(--fg3)">${escH(c.prev_value||'—')}</td><td style="font-size:12px;font-weight:500;color:var(--blue)">${escH(c.new_value)}</td><td style="font-size:11px;color:var(--fg3)">${escH(c.note||'—')}</td><td style="font-size:11px;color:var(--fg3);white-space:nowrap">${escH(c.created_at)}</td><td>${c.rolled_back?`<span class="badge b-gray" style="font-size:10px">Rolled back</span>`:`<button class="hbtn" style="padding:3px 8px;font-size:11px" onclick="rollbackOne(${c.id})">↩ Undo</button>`}</td></tr>`).join('')}</tbody></table></div>`:`<div class="empty">No changes recorded yet. Use Bulk Retag to reassign lines.</div>`}</div>`;}
function updateRollbackBtn(){const n=document.querySelectorAll('.chg-chk:checked').length;const btn=document.getElementById('rollback-sel-btn');if(btn){btn.style.display=n?'':'none';btn.textContent='↩ Rollback '+n+' selected';}}
function toggleAllChanges(checked){document.querySelectorAll('.chg-chk').forEach(c=>c.checked=checked);updateRollbackBtn();}
async function rollbackOne(id){if(!confirm('Undo this change?'))return;const r=await apiPost('/api/orgs/'+S.activeOrgId+'/changes/'+id+'/rollback',{});if(r?.ok){await loadDivisionsData();if(S.activeBillId)await loadBillData(S.activeBillId);}else alert('Rollback failed: '+(r?.detail||'Unknown error'));}
async function rollbackSelected(){const ids=[...document.querySelectorAll('.chg-chk:checked')].map(c=>parseInt(c.dataset.id));if(!ids.length)return;if(!confirm('Undo '+ids.length+' change(s)?'))return;const r=await apiPost('/api/orgs/'+S.activeOrgId+'/changes/rollback-bulk',{change_ids:ids});if(r){alert('Rolled back '+r.rolled_back+' change(s).'+(r.errors.length?' Errors: '+r.errors.join(', '):''));await loadDivisionsData();if(S.activeBillId)await loadBillData(S.activeBillId);}}
async function loadMoreChanges(){const c=await apiFetch('/api/orgs/'+S.activeOrgId+'/changes?limit=500&include_rolled_back=true');if(c){S.changes=c;renderChanges();}}

// ANALYTICS TAB
function renderAnalyticsPage(){
  const billOpts=(S.allBills||[]).map(b=>`<option value="${b.id}">${escH(b.statement_date||b.filename)}</option>`).join('');
  const hasManyBills=(S.allBills||[]).length>1;
  return `<div class="subtabs" id="ana-subtabs"><button class="stab active" onclick="switchAnaTab('trend',this)">Spend Trend</button><button class="stab" onclick="switchAnaTab('bva',this)">Budget vs Actual</button><button class="stab" onclick="switchAnaTab('forecast',this)">Forecast</button><button class="stab" onclick="switchAnaTab('alerts',this)">Alerts</button><button class="stab" onclick="switchAnaTab('benchmarks',this)">Cost-per-Head</button></div>`
    +(hasManyBills?`<div style="display:flex;align-items:center;gap:10px;padding:10px 0 2px;border-bottom:1px solid var(--border);margin-bottom:12px;flex-wrap:wrap"><span style="font-size:12px;font-weight:600;color:var(--fg3)">Comparing:</span><select id="ana-bill-filter" onchange="onAnaBillFilter(this.value)" style="background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:5px 8px;font-size:12px;color:var(--fg)"><option value="">All ${(S.allBills||[]).length} bills</option>${billOpts}</select><span style="font-size:11px;color:var(--fg3)">${(S.allBills||[]).length} bills imported</span></div>`:'')+`<div id="ana-content"><div class="spinner"></div></div>`;

async function onAnaBillFilter(billId){
  if(billId){S.activeBillId=parseInt(billId);document.getElementById('bill-select').value=billId;await loadBillData(parseInt(billId));}
  await loadAnalyticsData();renderAnaTab();
}
let _anaTab='trend';
function switchAnaTab(tab,btn){_anaTab=tab;destroyCharts();document.querySelectorAll('#ana-subtabs .stab').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');renderAnaTab();}
async function loadAnalyticsData(){
  if(!S.activeOrgId&&S.allBills.length){S.activeOrgId=S.allBills[0].org_id;}
  if(!S.activeOrgId){showTabEmpty('ana-content','Import a bill first.');return;}const[trends,topSpend,bva,forecast,breaches,alerts]=await Promise.all([apiFetch('/api/trends'+(S.activeOrgId?'?org_id='+S.activeOrgId:'')),apiFetch('/api/trends/top-spenders'+(S.activeOrgId?'?org_id='+S.activeOrgId:'')),apiFetch('/api/orgs/'+S.activeOrgId+'/budget-vs-actual'),apiFetch('/api/orgs/'+S.activeOrgId+'/forecast'),apiFetch('/api/orgs/'+S.activeOrgId+'/alert-breaches'),apiFetch('/api/orgs/'+S.activeOrgId+'/alerts')]);S.trends=trends||[];S.topSpenders=topSpend||[];S.budgetVsActual=bva||[];S.forecast=forecast||null;S.alertBreaches=breaches||[];S.alerts=alerts||[];renderAnaTab();}
function renderAnaTab(){if(_anaTab==='trend')renderTrendTab();else if(_anaTab==='bva')renderBVATab();else if(_anaTab==='forecast')renderForecastTab();else if(_anaTab==='alerts')renderAlertsTab();else renderBenchmarksTab();}

function renderTrendTab(){
  const el=document.getElementById('ana-content');if(!el)return;
  const t=S.trends;
  if(!t.length){el.innerHTML=noData('Import multiple bills to see trends.');return;}
  const topTable=S.topSpenders.length
    ?'<div class="tbl-wrap"><table><thead><tr><th>Name</th><th>Division</th><th style="text-align:right">Total (KES)</th><th>Months</th></tr></thead><tbody>'+
      S.topSpenders.map(sp=>'<tr class="clickable" onclick="openDrill({by:\'subscriber\',value:\''+escH(sp.subscriber_number)+'\',title:\''+escH(sp.raw_name)+'\'})">'
        +'<td><div style="font-weight:500">'+escH(sp.raw_name)+'</div><div style="font-size:11px;color:var(--fg3)">'+escH(sp.subscriber_number)+'</div></td>'
        +'<td><span class="badge b-blue" style="font-size:10px">'+escH(sp.division)+'</span></td>'
        +'<td style="text-align:right;font-weight:600;color:var(--blue)">'+fmtN(sp.total_all_months)+'</td>'
        +'<td>'+sp.month_count+'</td></tr>').join('')
      +'</tbody></table></div>'
    :noData('Import multiple bills to see top spenders.');
  el.innerHTML=
    '<div class="card"><div class="card-title">'+secTitle('sec.trend')+'</div><div class="ch-tall"><canvas id="trend-total"></canvas></div></div>'
    +'<div class="g2">'
      +'<div class="card"><div class="card-title">Division Trend</div><div class="ch-tall"><canvas id="trend-div"></canvas></div></div>'
      +'<div class="card"><div class="card-title">Subscribers &amp; Anomalies</div><div class="ch-tall"><canvas id="trend-subs"></canvas></div></div>'
    +'</div>'
    +'<div class="card"><div class="card-title">Top Spenders</div>'+topTable+'</div>';
  requestAnimationFrame(()=>{
    const COLS=['#2563eb','#0d9488','#d97706','#dc2626','#7c3aed','#16a34a','#f59e0b','#6366f1'];
    const ctx1=document.getElementById('trend-total')?.getContext('2d');
    if(ctx1)try{S.charts.tt=new Chart(ctx1,{type:'bar',data:{labels:t.map(b=>b.statement_date),datasets:[{label:'Total (KES)',data:t.map(b=>b.account_total),backgroundColor:'rgba(37,99,235,.7)',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>'KES '+fmtN(c.raw)}}},scales:{y:{ticks:{callback:v=>fmtN(v)}}}}})}catch(_){}
    const allDivs=[...new Set(t.flatMap(b=>Object.keys(b.divisions||{})))];
    const ctx2=document.getElementById('trend-div')?.getContext('2d');
    if(ctx2)try{S.charts.td=new Chart(ctx2,{type:'bar',data:{labels:t.map(b=>b.statement_date),datasets:allDivs.map((div,i)=>({label:div,data:t.map(b=>(b.divisions||{})[div]||0),backgroundColor:COLS[i%COLS.length]+'bb',borderRadius:2}))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:10},boxWidth:10,padding:6}},tooltip:{callbacks:{label:c=>c.dataset.label+': KES '+fmtN(c.raw)}}},scales:{x:{stacked:true},y:{stacked:true,ticks:{callback:v=>fmtN(v)}}}}})}catch(_){}
    const ctx3=document.getElementById('trend-subs')?.getContext('2d');
    if(ctx3)try{S.charts.ts=new Chart(ctx3,{type:'line',data:{labels:t.map(b=>b.statement_date),datasets:[{label:'Subscribers',data:t.map(b=>b.subscriber_count),borderColor:'#2563eb',fill:true,backgroundColor:'rgba(37,99,235,.07)',tension:.3,yAxisID:'y'},{label:'Anomalies',data:t.map(b=>b.anomaly_count),borderColor:'#dc2626',fill:true,backgroundColor:'rgba(220,38,38,.08)',tension:.3,yAxisID:'y1'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11},boxWidth:10}}},scales:{y:{position:'left'},y1:{position:'right',grid:{drawOnChartArea:false}}}}})}catch(_){}
  });
}
function renderBVATab(){

function renderBVAPeriod(idx){const period=S.budgetVsActual[idx];const el=document.getElementById('bva-period');if(!period||!el)return;el.innerHTML=`<div class="g3" style="margin-bottom:12px"><div class="kpi"><div class="kpi-label">Actual</div><div class="kpi-value">KES ${fmtN(period.total_actual)}</div></div><div class="kpi"><div class="kpi-label">Budget</div><div class="kpi-value">${period.total_budget?'KES '+fmtN(period.total_budget):'—'}</div>${!period.total_budget?`<div class="kpi-sub"><a href="#" onclick="openBudgetEditor();return false">Add budgets →</a></div>`:''}</div><div class="kpi"><div class="kpi-label">Variance</div><div class="kpi-value" style="color:${(period.total_actual-period.total_budget)>0?'var(--coral)':'var(--green)'}">${period.total_budget?((period.total_actual-period.total_budget)>=0?'+':'')+'KES '+fmtN(period.total_actual-period.total_budget):'—'}</div></div></div><div class="tbl-wrap"><table><thead><tr><th>Division</th><th style="text-align:right">Actual</th><th style="text-align:right">Budget</th><th style="text-align:right">Variance</th><th style="text-align:right">% Used</th><th>Status</th></tr></thead><tbody>${period.divisions.map(d=>{const bc=d.status==='over'?'b-red':d.status==='warning'?'b-amber':d.status==='ok'?'b-green':'b-gray';return `<tr class="clickable" onclick="openDrill({by:'division',value:'${escH(d.division)}',title:'${escH(d.division)}'})"><td><strong>${escH(d.division)}</strong>${d.budget_kes?`<div class="top3-bar"><div class="top3-fill" style="width:${Math.min(d.pct_of_budget||0,100)}%;background:${d.status==='over'?'var(--coral)':d.status==='warning'?'var(--amber)':'var(--green)'}"></div></div>`:''}</td><td style="text-align:right;font-weight:600">${fmtN(d.actual_kes)}</td><td style="text-align:right;color:var(--fg3)">${d.budget_kes?fmtN(d.budget_kes):'—'}</td><td style="text-align:right;color:${d.variance_kes>0?'var(--coral)':d.variance_kes<0?'var(--green)':'var(--fg3)'}">${d.variance_kes!=null?(d.variance_kes>=0?'+':'')+fmtN(d.variance_kes):'—'}</td><td style="text-align:right">${d.pct_of_budget!=null?d.pct_of_budget+'%':'—'}</td><td><span class="badge ${bc}" style="font-size:10px">${d.status==='over'?'▲ Over':d.status==='warning'?'⚠ Near':'✓ OK'}</span></td></tr>`;}).join('')}</tbody></table></div>`;}

function renderForecastTab(){const el=document.getElementById('ana-content');if(!el)return;const fc=S.forecast;if(!fc||!fc.forecast?.length){el.innerHTML=noData(fc?.message||'Import at least 2 bills to generate a forecast.');return;}const dir=fc.slope_kes_per_month>=0;el.innerHTML=`<div class="g3" style="margin-bottom:12px"><div class="kpi"><div class="kpi-label">Trend</div><div class="kpi-value" style="color:${dir?'var(--coral)':'var(--green)'}">${dir?'▲ Rising':'▼ Falling'}</div><div class="kpi-sub">KES ${fmtN(Math.abs(fc.slope_kes_per_month))} / month</div></div><div class="kpi"><div class="kpi-label">Next Month</div><div class="kpi-value">KES ${fmtN(fc.forecast[0]?.predicted_kes||0)}</div><div class="kpi-sub">±KES ${fmtN(fc.std_dev)}</div></div><div class="kpi"><div class="kpi-label">3-Month Total</div><div class="kpi-value">KES ${fmtN(fc.forecast.reduce((s,p)=>s+p.predicted_kes,0))}</div></div></div><div class="card"><div class="card-title">${secTitle('sec.forecast')}</div><div class="ch-tall" style="height:300px"><canvas id="fc-chart"></canvas></div></div>`;requestAnimationFrame(()=>{const ctx=document.getElementById('fc-chart')?.getContext('2d');if(!ctx)return;const hist=fc.history||[],fore=fc.forecast||[];try{S.charts.fc=new Chart(ctx,{type:'line',data:{labels:[...hist.map(h=>h.period),...fore.map(f=>f.period)],datasets:[{label:'Actual',data:[...hist.map(h=>h.actual_kes),...fore.map(()=>null)],borderColor:'#2563eb',backgroundColor:'rgba(37,99,235,.07)',fill:true,tension:.2,pointRadius:4},{label:'Forecast',data:[...hist.map(()=>null),...fore.map(f=>f.predicted_kes)],borderColor:'#d97706',borderDash:[5,3],fill:false,tension:0,pointRadius:3},{label:'Upper',data:[...hist.map(()=>null),...fore.map(f=>f.upper_kes)],borderColor:'rgba(220,38,38,.3)',borderDash:[3,3],fill:false,pointRadius:0},{label:'Lower',data:[...hist.map(()=>null),...fore.map(f=>f.lower_kes)],borderColor:'rgba(22,163,74,.3)',borderDash:[3,3],fill:false,pointRadius:0}]},options:{responsive:true,maintainAspectRatio:false,spanGaps:true,plugins:{legend:{position:'bottom',labels:{font:{size:11},boxWidth:10}},tooltip:{callbacks:{label:c=>c.dataset.label+': KES '+fmtN(c.raw)}}},scales:{y:{ticks:{callback:v=>fmtN(v)}}}}})}catch(_){}});}

function renderAlertsTab(){const el=document.getElementById('ana-content');if(!el)return;const alerts=S.alerts||[],breaches=S.alertBreaches||[];el.innerHTML=`${breaches.length?`<div style="background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;padding:14px 16px;margin-bottom:14px"><strong style="color:#991b1b">⚠ ${breaches.length} active breach${breaches.length>1?'es':''}</strong><div class="tbl-wrap" style="margin-top:8px"><table><thead><tr><th>Name</th><th>Scope</th><th style="text-align:right">Actual</th><th style="text-align:right">Limit</th><th style="text-align:right">Over by</th></tr></thead><tbody>${breaches.map(b=>`<tr><td style="font-weight:500">${escH(b.name)}</td><td><span class="badge b-gray" style="font-size:10px">${escH(b.scope)}</span></td><td style="text-align:right;font-weight:600;color:var(--coral)">KES ${fmtN(b.actual_kes)}</td><td style="text-align:right">KES ${fmtN(b.threshold_kes)}</td><td style="text-align:right;color:var(--coral)">+KES ${fmtN(b.overage_kes)} (${b.pct_over}%)</td></tr>`).join('')}</tbody></table></div></div>`:`<div style="background:#d1fae5;border:1px solid #6ee7b7;border-radius:8px;padding:11px 16px;margin-bottom:12px;font-size:13px;color:#065f46">✓ No active threshold breaches.</div>`}<div class="card"><div class="card-title" style="display:flex;justify-content:space-between"><span>${secTitle('sec.alerts')} (${alerts.length})</span><button class="hbtn primary" onclick="openAddAlert()">+ Add alert</button></div>${alerts.length?`<div class="tbl-wrap"><table><thead><tr><th>Scope</th><th>Target</th><th style="text-align:right">Threshold (KES)</th><th></th></tr></thead><tbody>${alerts.map(a=>`<tr><td><span class="badge b-blue" style="font-size:10px">${escH(a.scope)}</span></td><td>${escH(a.scope_value||'Total bill')}</td><td style="text-align:right;font-weight:600">${fmtN(a.threshold_kes)}</td><td><button class="hbtn" style="padding:3px 8px;font-size:11px;color:var(--coral)" onclick="deleteAlert(${a.id})">✕</button></td></tr>`).join('')}</tbody></table></div>`:`<div class="empty">No alerts. Add a spend ceiling to get notified.</div>`}</div>`;}

function renderBenchmarksTab(){const el=document.getElementById('ana-content');if(!el)return;const latest=S.budgetVsActual[S.budgetVsActual.length-1];if(!latest){el.innerHTML=noData();return;}const withH=latest.divisions.filter(d=>d.headcount>0&&d.cost_per_head!=null);const withoutH=latest.divisions.filter(d=>!d.headcount);const maxCPH=Math.max(...withH.map(d=>d.cost_per_head),1);el.innerHTML=`<div class="card"><div class="card-title" style="display:flex;justify-content:space-between"><span>${secTitle('sec.benchmarks')} — ${escH(latest.period)}</span><button class="hbtn" onclick="openBudgetEditor()">✎ Set headcount</button></div>${withH.length?`<div class="tbl-wrap"><table><thead><tr><th>Division</th><th style="text-align:right">Actual (KES)</th><th style="text-align:right">Headcount</th><th style="text-align:right">Cost/Head</th><th>Bar</th></tr></thead><tbody>${withH.sort((a,b)=>b.cost_per_head-a.cost_per_head).map(d=>`<tr class="clickable" onclick="openDrill({by:'division',value:'${escH(d.division)}',title:'${escH(d.division)}'})"><td><strong>${escH(d.division)}</strong></td><td style="text-align:right">${fmtN(d.actual_kes)}</td><td style="text-align:right">${d.headcount}</td><td style="text-align:right;font-weight:600;color:var(--blue)">${fmtN(d.cost_per_head)}</td><td style="min-width:100px"><div class="top3-bar"><div class="top3-fill" style="width:${Math.round(d.cost_per_head/maxCPH*100)}%"></div></div></td></tr>`).join('')}</tbody></table></div>`:''}${withoutH.length?`<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)"><div style="font-size:12px;color:var(--fg3);margin-bottom:6px">${withoutH.length} divisions without headcount</div><div style="display:flex;flex-wrap:wrap;gap:6px">${withoutH.map(d=>`<span class="badge b-gray">${escH(d.division)}</span>`).join('')}</div><div style="margin-top:8px;font-size:12px;color:var(--fg3)"><a href="#" onclick="openBudgetEditor();return false">Add headcount →</a></div></div>`:``}</div>`;}

// Budget helpers
async function openBudgetEditor(){const budgets=await apiFetch('/api/orgs/'+S.activeOrgId+'/budgets')||[];const divs=[...new Set(S.budgetVsActual.flatMap(p=>p.divisions.map(d=>d.division)))].sort();const periods=[...new Set(S.budgetVsActual.map(p=>p.period))].sort();const bMap={};budgets.forEach(b=>{bMap[b.division+'|'+b.period]=b;});showModal('✎ Edit Budgets & Headcount','<div style="font-size:12px;color:var(--fg3);margin-bottom:12px">Set monthly budget per division.</div><div class="tbl-wrap"><table><thead><tr><th>Division</th><th>Period</th><th>Budget (KES)</th><th>Headcount</th></tr></thead><tbody>'+divs.flatMap(div=>periods.map(period=>{const ex=bMap[div+'|'+period]||{};return `<tr><td style="font-weight:500">${escH(div)}</td><td style="color:var(--fg3)">${escH(period)}</td><td><input type="number" data-div="${escH(div)}" data-period="${escH(period)}" data-field="budget_kes" style="width:110px;background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:4px 7px;font-size:12px;color:var(--fg)" value="${ex.budget_kes||''}" placeholder="0" min="0"></td><td><input type="number" data-div="${escH(div)}" data-period="${escH(period)}" data-field="headcount" style="width:70px;background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:4px 7px;font-size:12px;color:var(--fg)" value="${ex.headcount||''}" placeholder="0" min="0"></td></tr>`;})).join('')+'</tbody></table></div>','saveBudgetEdits()');}
async function saveBudgetEdits(){const rows={};document.querySelectorAll('input[data-div]').forEach(inp=>{const k=inp.dataset.div+'|'+inp.dataset.period;if(!rows[k])rows[k]={division:inp.dataset.div,period:inp.dataset.period};rows[k][inp.dataset.field]=parseFloat(inp.value)||0;});await Promise.all(Object.values(rows).map(r=>apiPost('/api/orgs/'+S.activeOrgId+'/budgets',r)));closeModal();await loadAnalyticsData();}
function downloadBudgetTemplate(){const divs=[...new Set(S.budgetVsActual.flatMap(p=>p.divisions.map(d=>d.division)))].sort();const periods=[...new Set(S.budgetVsActual.map(p=>p.period))].sort();const rows=[['division','period','budget_kes','headcount']];divs.forEach(div=>periods.forEach(period=>rows.push([div,period,'',''])));downloadCSV(rows,'budget_template.csv');}
function openBudgetImport(){const inp=document.createElement('input');inp.type='file';inp.accept='.csv';inp.onchange=async()=>{const fd=new FormData();fd.append('file',inp.files[0]);const r=await fetch('/api/orgs/'+S.activeOrgId+'/budgets/import-csv',{method:'POST',body:fd});const d=await r.json();alert('Imported '+d.imported+' rows.'+(d.errors.length?'\n'+d.errors.join('\n'):''));await loadAnalyticsData();};inp.click();}
function openAddAlert(){const divs=(S.orgDivisions||[]).map(d=>`<option value="${escH(d.name)}">${escH(d.name)}</option>`).join('');showModal('Add Spend Alert','<div class="field-row"><label>Scope</label><select id="aa-scope" onchange="updateAlertScope()"><option value="total">Total bill</option><option value="division">Division</option><option value="subscriber">Subscriber</option></select></div><div id="aa-val-row" class="field-row" style="display:none"><label id="aa-val-lbl">Value</label><input id="aa-val" list="aa-val-list"><datalist id="aa-val-list">'+divs+'</datalist></div><div class="field-row"><label>Threshold (KES)</label><input id="aa-thresh" type="number" min="0" placeholder="e.g. 50000"></div>','saveAlert()');}
function updateAlertScope(){const s=document.getElementById('aa-scope')?.value;const row=document.getElementById('aa-val-row');const lbl=document.getElementById('aa-val-lbl');if(row)row.style.display=s==='total'?'none':'flex';if(lbl)lbl.textContent=s==='division'?'Division':'Subscriber number';}
async function saveAlert(){const scope=document.getElementById('aa-scope')?.value;const val=document.getElementById('aa-val')?.value.trim()||'';const thresh=parseFloat(document.getElementById('aa-thresh')?.value);if(!thresh){alert('Enter a threshold.');return;}if(scope!=='total'&&!val){alert('Enter a value.');return;}await apiPost('/api/orgs/'+S.activeOrgId+'/alerts',{scope,scope_value:val,threshold_kes:thresh});closeModal();const[br,al]=await Promise.all([apiFetch('/api/orgs/'+S.activeOrgId+'/alert-breaches'),apiFetch('/api/orgs/'+S.activeOrgId+'/alerts')]);S.alertBreaches=br||[];S.alerts=al||[];renderAlertsTab();}
async function deleteAlert(id){if(!confirm('Remove this alert?'))return;await apiDel('/api/orgs/'+S.activeOrgId+'/alerts/'+id);const[br,al]=await Promise.all([apiFetch('/api/orgs/'+S.activeOrgId+'/alert-breaches'),apiFetch('/api/orgs/'+S.activeOrgId+'/alerts')]);S.alertBreaches=br||[];S.alerts=al||[];renderAlertsTab();}

ius:6px;padding:5px 8px;font-size:13px;color:var(--fg)"></div><button class="hbtn primary" onclick="buildCustomReport()" style="width:100%">📄 Generate & Download</button></div><div class="card"><div class="card-title">Quick Exports</div><div style="display:flex;flex-direction:column;gap:8px"><button class="hbtn" onclick="downloadReport()" style="text-align:left;padding:10px 13px"><div style="font-weight:500">📄 Standard .docx Report</div><div style="font-size:11px;color:var(--fg3);margin-top:2px">All sections, all divisions</div></button><button class="hbtn" onclick="downloadChargebackExcel()" style="text-align:left;padding:10px 13px"><div style="font-weight:500">📊 Chargeback Excel Pack</div><div style="font-size:11px;color:var(--fg3);margin-top:2px">Multi-sheet, one tab per division</div></button><button class="hbtn" onclick="downloadChargebackCSV()" style="text-align:left;padding:10px 13px"><div style="font-weight:500">📋 Chargeback CSV</div><div style="font-size:11px;color:var(--fg3);margin-top:2px">Flat CSV of all lines</div></button></div></div></div>`;}

function showImportProgress(show){const el=document.getElementById('import-overlay');if(el)el.classList.toggle('active',show);}
function setImpState(title,status,pct,detail){const t=document.getElementById('imp-title');const s=document.getElementById('imp-status');const b=document.getElementById('imp-bar');const d=document.getElementById('imp-detail');if(t)t.textContent=title;if(s)s.textContent=status;if(b)b.style.width=pct+'%';if(d)d.textContent=detail||'';}
function openImport(){const inp=document.createElement('input');inp.type='file';inp.accept='.pdf';inp.multiple=true;inp.onchange=async()=>{const files=[...inp.files];showImportProgress(true);const results=[];for(let i=0;i<files.length;i++){const file=files[i];const label=files.length>1?'Bill '+(i+1)+' of '+files.length:file.name;setImpState('Importing '+label,'Uploading & parsing PDF…',Math.round(i/files.length*80),file.name);try{const fd=new FormData();fd.append('file',file);const r=await fetch('/api/bills/upload',{method:'POST',body:fd});const data=await r.json();results.push({file:file.name,...data});const msg=data.status==='ok'?('✓ '+(data.subscriber_count||0).toLocaleString()+' subscribers — KES '+(data.account_total||0).toLocaleString('en-KE',{maximumFractionDigits:0})):data.status==='duplicate'?'Already imported — skipping':'Check console';setImpState('Importing '+label,msg,Math.round(i/files.length*80)+10,data.org_name||'');}catch(err){results.push({file:file.name,status:'error',error:err.message});}}setImpState('Finalising…','Loading dashboard…',95,'');await loadOrgs();await loadBills(S.activeOrgId);if(S.activeBillId){await loadBillData(S.activeBillId);await loadOrgDivisions();}setImpState('Done!','Import complete.',100,'');await new Promise(r=>setTimeout(r,900));showImportProgress(false);renderTabs();renderTab(S.activeTab);const ok=results.filter(r=>r.status==='ok').length;const dup=results.filter(r=>r.status==='duplicate').length;const err=results.filter(r=>r.status==='error').length;if(results.length>1||err>0)alert('Import complete:\n✓ '+ok+' imported\n◷ '+dup+' duplicate(s)\n✗ '+err+' error(s)');};inp.click();}

async function reclassifyBill(){if(!S.activeBillId){alert('No bill selected.');return;}const btn=document.getElementById('reclassify-btn');const orig=btn?.innerHTML;if(btn){btn.innerHTML='⏳';btn.disabled=true;}const r=await apiPost('/api/bills/'+S.activeBillId+'/reclassify',{});if(btn){btn.innerHTML=orig;btn.disabled=false;}if(r){alert('Reclassified: '+r.changed+' of '+r.total_lines+' lines updated.');await loadBillData(S.activeBillId);await loadOrgDivisions();renderTab(S.activeTab);}}

async function openDrill(params){if(!S.activeBillId)return;const{by,value,title}=params;document.getElementById('drill-title').textContent=title;document.getElementById('drill-stats').innerHTML='<div class="spinner"></div>';document.getElementById('drill-body').innerHTML='';document.getElementById('drill-spark').style.display='none';document.getElementById('drill-footer').innerHTML='';document.getElementById('drill-overlay').classList.add('open');document.getElementById('drill-panel').classList.add('open');const data=await apiFetch('/api/bills/'+S.activeBillId+'/drilldown?by='+encodeURIComponent(by)+'&value='+encodeURIComponent(value||''));if(!data){closeDrill();return;}const pct=S.summary?((data.total_amount/S.summary.account_total)*100).toFixed(1):'–';document.getElementById('drill-stats').innerHTML=`<div><div class="dp-stat-val">KES ${fmtN(data.total_amount)}</div><div class="dp-stat-lbl">Total</div></div><div><div class="dp-stat-val">${data.count}</div><div class="dp-stat-lbl">Lines</div></div><div><div class="dp-stat-val">${pct}%</div><div class="dp-stat-lbl">of Bill</div></div>`;if(data.history&&data.history.length>1){document.getElementById('drill-spark').style.display='';const ctx=document.getElementById('drill-spark-canvas').getContext('2d');if(_drillSpark)_drillSpark.destroy();try{_drillSpark=new Chart(ctx,{type:'line',data:{labels:data.history.map(h=>h.date),datasets:[{data:data.history.map(h=>h.amount),borderColor:'#2563eb',backgroundColor:'rgba(37,99,235,.07)',tension:.35,fill:true,pointRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>'KES '+fmtN(c.raw)}}},scales:{x:{ticks:{font:{size:10}}},y:{ticks:{font:{size:10},callback:v=>fmtN(v)}}}}});}catch(_){}}const top3=[...data.lines].sort((a,b)=>b.amount_due_kes-a.amount_due_kes).slice(0,3);const maxA=top3[0]?.amount_due_kes||1;const top3html=top3.length?`<div class="dp-section"><div class="dp-section-title">Top contributors</div>${top3.map(l=>`<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:12px"><span style="font-weight:500">${escH(l.raw_name||l.subscriber_number)}</span><span style="color:var(--blue);font-weight:600">KES ${fmtN(l.amount_due_kes)}</span></div><div class="top3-bar"><div class="top3-fill" style="width:${Math.round(l.amount_due_kes/maxA*100)}%"></div></div><div style="font-size:11px;color:var(--fg3)">${escH(l.division)} · ${escH(l.tariff_plan||'')}</div></div>`).join('')}</div>`:'';const anomCount=data.lines.filter(l=>l.is_anomaly).length;document.getElementById('drill-body').innerHTML=top3html+`<div class="dp-section" style="margin-top:${top3.length?'8px':'0'}"><div class="dp-section-title" style="display:flex;justify-content:space-between"><span>Line items (${data.count})</span>${anomCount?`<span class="badge b-red">${anomCount} anomalies</span>`:''}</div><table class="dp-tbl"><thead><tr><th>Name</th><th>Number</th><th>Division</th><th style="text-align:right">KES</th></tr></thead><tbody>${data.lines.map(l=>`<tr class="${l.is_anomaly?'anom':''}" onclick="openSubHistory('${escH(l.subscriber_number)}')"><td><div style="font-weight:500">${escH(l.raw_name||'—')}</div><div style="font-size:10px;color:var(--fg3)">${escH(l.tariff_plan||'')}</div>${l.is_anomaly?'<div style="font-size:10px;color:var(--coral)">'+escH(l.anomaly_reason)+'</div>':''}</td><td style="font-size:11px;color:var(--fg3);white-space:nowrap">${escH(l.subscriber_number)}</td><td><span class="badge b-blue" style="font-size:10px">${escH(l.division)}</span></td><td style="text-align:right;font-weight:600;color:var(--blue);white-space:nowrap">KES ${fmtN(l.amount_due_kes)}</td></tr>`).join('')}</tbody></table></div>`;const ck=++_drillCacheKey;_drillCache.set(ck,data);document.getElementById('drill-footer').innerHTML=`<button class="hbtn" onclick="exportDrillCSV(${ck})">⬇ CSV</button><button class="hbtn" onclick="closeDrill()">Close</button>`;}
function closeDrill(){document.getElementById('drill-overlay').classList.remove('open');document.getElementById('drill-panel').classList.remove('open');}
function exportDrillCSV(ck){const data=_drillCache.get(ck);if(!data){alert('Export data not available.');return;}const rows=[['Number','Name','Division','Tariff','Pre-Tax','Excise','VAT','Amount (KES)','Anomaly','Reason']];data.lines.forEach(l=>rows.push([l.subscriber_number,l.raw_name,l.division,l.tariff_plan,l.pre_tax,l.excise,l.vat,l.amount_due_kes,l.is_anomaly?'Yes':'',l.anomaly_reason||'']));downloadCSV(rows,'drilldown.csv');}

function showModal(title,body,saveCall){const ex=document.getElementById('__modal');if(ex)ex.remove();const el=document.createElement('div');el.id='__modal';el.className='modal-overlay';el.innerHTML=`<div class="modal"><div class="modal-head"><span class="modal-title">${escH(title)}</span><button class="dp-close" onclick="closeModal()">✕</button></div>${body}<div style="display:flex;gap:8px;margin-top:16px"><button class="hbtn primary" onclick="${saveCall}" style="flex:1">Save</button><button class="hbtn" onclick="closeModal()">Cancel</button></div></div>`;document.body.appendChild(el);}

let _histData=null,_histSub=null,_histAsOf='';
const _EV={first_seen:['🟢','b-green'],reactivated:['♻️','b-green'],name_change:['✏️','b-blue'],plan_change:['🔄','b-amber'],cost_spike:['🔺','b-red'],cost_drop:['🔻','b-green'],gone:['🔴','b-red'],dormant:['⏸️','b-amber']};
const _ST={active:'b-green',dormant:'b-amber',gone:'b-red',unknown:'b-blue'};
async function openSubHistory(subNum,asOf){
  if(!S.activeOrgId)return;
  _histSub=subNum;_histAsOf=asOf||'';
  document.getElementById('hist-overlay').classList.add('open');
  document.getElementById('hist-panel').classList.add('open');
  document.getElementById('hist-title').textContent='Loading…';
  document.getElementById('hist-stats').innerHTML='<div class="spinner"></div>';
  document.getElementById('hist-body').innerHTML='';
  document.getElementById('hist-footer').innerHTML='';
  document.getElementById('hist-chart-wrap').style.display='none';
  const d=await apiFetch('/api/orgs/'+S.activeOrgId+'/subscribers/'+encodeURIComponent(subNum)+'/history'+(asOf?'?as_of='+encodeURIComponent(asOf):''));
  if(!d){closeSubHistory();return;}
  _histData=d;renderSubHistory(d);
}
function closeSubHistory(){
  if(S.charts.hist){try{S.charts.hist.destroy();}catch(_){}S.charts.hist=null;}
  document.getElementById('hist-overlay').classList.remove('open');
  document.getElementById('hist-panel').classList.remove('open');
}
function renderSubHistory(d){
  const s=d.summary||{},tl=d.timeline||[],evs=d.events||[],chg=d.changes||[];
  document.getElementById('hist-title').textContent=(s.current_name||d.display_number||d.subscriber_number);
  document.getElementById('hist-stats').innerHTML=
    `<div><div class="dp-stat-val">KES ${fmtN(s.lifetime_spend||0)}</div><div class="dp-stat-lbl">Lifetime</div></div>`+
    `<div><div class="dp-stat-val">${s.bills_present||0}/${s.bills_total||0}</div><div class="dp-stat-lbl">Bills present</div></div>`+
    `<div><div class="dp-stat-val">KES ${fmtN(s.avg_monthly||0)}</div><div class="dp-stat-lbl">Avg / bill</div></div>`+
    `<div><div class="dp-stat-val"><span class="badge ${_ST[s.status]||'b-blue'}" style="font-size:11px">${escH((s.status||'—').toUpperCase())}</span></div><div class="dp-stat-lbl">Status</div></div>`;
  if(tl.length>1){
    document.getElementById('hist-chart-wrap').style.display='';
    requestAnimationFrame(()=>{
      const ctx=document.getElementById('hist-chart-canvas')?.getContext('2d');if(!ctx)return;
      if(S.charts.hist){try{S.charts.hist.destroy();}catch(_){}}
      try{S.charts.hist=new Chart(ctx,{type:'line',data:{labels:tl.map(t=>t.statement_date),datasets:[{data:tl.map(t=>t.amount_due_kes),borderColor:'#2563eb',backgroundColor:'rgba(37,99,235,.08)',tension:.3,fill:true,pointRadius:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>'KES '+fmtN(c.raw)}}},scales:{x:{ticks:{font:{size:10}}},y:{ticks:{font:{size:10},callback:v=>fmtN(v)}}}}});}catch(_){}
    });
  }
  const tagsH=(d.profile?.tags||'').split(',').map(t=>t.trim()).filter(Boolean).map(t=>`<span class="badge b-blue" style="font-size:10px">${escH(t)}</span>`).join(' ');
  const aps=d.available_periods||[];
  const asOfSel=aps.length>1?`<div class="dp-section" style="padding-bottom:6px"><label style="font-size:11px;color:var(--fg3)">As of period </label><select onchange="openSubHistory('${escH(d.subscriber_number)}',this.value)" style="background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:3px 6px;font-size:12px;color:var(--fg)"><option value="">Latest</option>${aps.map(p=>`<option value="${escH(p.statement_iso)}" ${d.as_of===p.statement_iso?'selected':''}>${escH(p.statement_date)}</option>`).join('')}</select></div>`:'';
  let html=asOfSel+`<div class="dp-section"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span style="color:var(--fg3)">${escH(d.display_number||'')}</span><span class="badge b-blue" style="font-size:10px">${escH(s.current_division||'–')}</span></div><div style="font-size:11px;color:var(--fg3)">First seen ${escH(s.first_seen||'—')} · Last seen ${escH(s.last_seen||'—')}</div>${tagsH?`<div style="margin-top:5px">${tagsH}</div>`:''}</div>`;
  if(evs.length){
    html+=`<div class="dp-section"><div class="dp-section-title">Activity (${evs.length})</div>`+
      evs.map(e=>{const m=_EV[e.type]||['•','b-blue'];return `<div class="ev-row"><span style="font-size:13px">${m[0]}</span><div style="flex:1"><div style="font-size:12px">${escH(e.detail||e.type)}</div><div style="font-size:10px;color:var(--fg3)">${escH(e.statement_date||'')}</div></div></div>`;}).join('')+`</div>`;
  }
  if(chg.length){
    html+=`<div class="dp-section"><div class="dp-section-title">Manual changes (${chg.length})</div>`+
      chg.map(c=>`<div class="ev-row"><span style="font-size:13px">${c.rolled_back?'↩️':'🖊️'}</span><div style="flex:1"><div style="font-size:12px">${escH(c.field)}: <span style="color:var(--fg3)">${escH(c.prev_value||'∅')}</span> → <strong>${escH(c.new_value||'∅')}</strong>${c.rolled_back?' <span class="badge b-amber" style="font-size:9px">rolled back</span>':''}</div><div style="font-size:10px;color:var(--fg3)">${escH(c.created_at||'')} · ${escH(c.actor||'')}${c.note?' · '+escH(c.note):''}</div></div>${(!c.rolled_back&&c.id)?`<button class="hbtn" style="padding:2px 7px;font-size:10px;align-self:center" onclick="histRollback(${c.id})">↩ Undo</button>`:''}</div>`).join('')+`</div>`;
  }
  if(tl.length){
    html+=`<div class="dp-section"><div class="dp-section-title">By bill (${tl.length})</div><table class="dp-tbl"><thead><tr><th>Period</th><th>Name</th><th>Division</th><th style="text-align:right">CDRs</th><th style="text-align:right">KES</th><th style="text-align:right">Δ</th></tr></thead><tbody>`+
      tl.map(t=>{const dpct=(t.delta_pct==null)?'':` (${t.delta_pct>0?'+':''}${t.delta_pct}%)`;const dcol=t.delta_kes==null?'var(--fg3)':(t.delta_kes>0?'var(--coral)':(t.delta_kes<0?'var(--green)':'var(--fg3)'));const dtxt=t.delta_kes==null?'—':((t.delta_kes>0?'+':'')+fmtN(t.delta_kes)+dpct);return `<tr class="${t.is_anomaly?'anom':''}"><td style="font-size:11px;white-space:nowrap">${escH(t.statement_date)}</td><td style="font-size:11px">${escH(t.raw_name||'—')}</td><td><span class="badge b-blue" style="font-size:9px">${escH(t.division||'–')}</span></td><td style="text-align:right;font-size:11px;color:var(--fg3)">${t.cdr_count||0}</td><td style="text-align:right;font-weight:600;color:var(--blue);white-space:nowrap">${fmtN(t.amount_due_kes)}</td><td style="text-align:right;font-size:11px;white-space:nowrap;color:${dcol}">${dtxt}</td></tr>`;}).join('')+`</tbody></table></div>`;
  }
  if(!tl.length&&!evs.length){html+=`<div class="empty">No billing history found for this number.</div>`;}
  document.getElementById('hist-body').innerHTML=html;
  document.getElementById('hist-footer').innerHTML=`<button class="hbtn" onclick="exportSubHistoryCSV()">⬇ CSV</button><button class="hbtn" onclick="openSubEditor('${escH(d.subscriber_number)}')">✎ Edit</button><button class="hbtn" onclick="closeSubHistory()">Close</button>`;
}
function exportSubHistoryCSV(){
  if(!_histData)return;const d=_histData;const rows=[['Period','Name','Division','Tariff','CDRs','Amount KES','Delta KES','Delta %']];
  (d.timeline||[]).forEach(t=>rows.push([t.statement_date,t.raw_name||'',t.division||'',t.tariff_plan||'',t.cdr_count||0,t.amount_due_kes,t.delta_kes==null?'':t.delta_kes,t.delta_pct==null?'':t.delta_pct]));
  const csv=rows.map(r=>r.map(v=>{const x=String(v==null?'':v);return /[",\n]/.test(x)?'"'+x.replace(/"/g,'""')+'"':x;}).join(',')).join('\n');
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=(d.display_number||d.subscriber_number)+'_history.csv';a.click();URL.revokeObjectURL(a.href);
}
async function histRollback(id){
  if(!confirm('Undo this change? It will be restored and the line/profile reverted.'))return;
  const r=await apiPost('/api/orgs/'+S.activeOrgId+'/changes/'+id+'/rollback',{});
  if(r&&r.ok){S.waste=null;await openSubHistory(_histSub,_histAsOf);}
  else alert('Rollback failed: '+((r&&r.detail)||'Unknown error'));
}

// UTILS
function fmtN(n){if(n==null||isNaN(n))return '0';return Number(n).toLocaleString('en-KE',{minimumFractionDigits:0,maximumFractionDigits:0});}
function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function kpi(labelKey,value,sub,drillBy,drillVal){return `<div class="kpi" onclick="openDrill({by:'${drillBy}',value:'${escH(drillVal)}',title:'${escH(lbl(labelKey))}'})"><div class="kpi-label">${escH(lbl(labelKey))}</div><div class="kpi-value">${value}</div>${sub?`<div class="kpi-sub">${sub}</div>`:''}<div class="kpi-hint">▼ drill</div></div>`;}
function downloadCSV(rows,filename){const csv=rows.map(r=>r.map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download=filename;a.click();}

// BOOT
(async function boot(){renderTabs();await loadOrgs();await loadBills(S.activeOrgId);if(S.activeBillId){await loadBillData(S.activeBillId);await loadOrgDivisions();}renderTabs();renderTab(S.activeTab);startResourceMonitor();})();

// RESOURCE MONITOR
let _resTimer=null;
async function startResourceMonitor(){
  await updateResourceIndicator();
  _resTimer=setInterval(updateResourceIndicator,30000);
}
async function updateResourceIndicator(){
  const data=await apiFetch('/api/health/resources');
  const el=document.getElementById('res-indicator');
  if(!el||!data?.ok)return;
  const warn=data.warning||data.critical;
  const col=data.critical?'var(--coral)':data.warning?'var(--amber)':'var(--green)';
  el.innerHTML=`<span style="font-size:10px;color:${col}" title="CPU: ${data.cpu_pct}% | RAM: ${data.ram_used_mb}MB/${data.ram_total_mb}MB (${data.ram_pct}%) | App: ${data.proc_rss_mb}MB">`
    +(data.critical?'⚠':data.warning?'◕':'●')
    +` RAM ${data.ram_pct}%</span>`;
}
</script></body></html>
