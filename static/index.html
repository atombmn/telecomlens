<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TelecomLens</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js" integrity="sha512-CQBWl4fJHWbryGE+Pc3UJWW1h3QFkAhIXRIMQYcMqiTPSBXlCFkCVYtNHCVnqfFx+RFDhR7VgFZMjGqniGng==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<style>
:root {
  --bg:#f8f9fa;--bg2:#f1f3f5;--bg3:#e9ecef;--fg:#1a1a2e;--fg2:#495057;--fg3:#868e96;
  --blue:#2563eb;--teal:#0d9488;--coral:#dc2626;--amber:#d97706;--green:#16a34a;
  --purple:#7c3aed;--border:#dee2e6;--card:#ffffff;--radius:8px;
  --shadow:0 1px 4px rgba(0,0,0,.07);--panel-w:420px;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#0f0f14;--bg2:#1a1a24;--bg3:#25253a;--fg:#e4e4ec;--fg2:#a0a0b8;--fg3:#6b6b80;
        --border:#2a2a3e;--card:#16161f;}
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--fg);font-size:14px;line-height:1.5}
a{color:var(--blue);text-decoration:none}
.container{max-width:1240px;margin:0 auto;padding:1rem}

/* Header */
.header{background:var(--card);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;gap:1rem;height:52px;position:sticky;top:0;z-index:100}
.logo{font-weight:700;font-size:16px;color:var(--blue);letter-spacing:-.5px}
.header-sep{flex:1}
select.hselect{background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--fg);padding:5px 8px;font-size:13px;cursor:pointer}
.hbtn{background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--fg2);padding:5px 10px;font-size:12px;cursor:pointer;white-space:nowrap}
.hbtn:hover{background:var(--bg3)}
.hbtn.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.hbtn.primary:hover{background:#1d4ed8}

/* Tabs */
.tabs{display:flex;gap:2px;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 1.5rem;overflow-x:auto}
.tab{padding:10px 16px;font-size:13px;font-weight:500;color:var(--fg3);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s}
.tab:hover{color:var(--fg)}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab-edit{background:none;border:none;cursor:pointer;color:var(--fg3);font-size:11px;padding:0 0 0 4px;opacity:0;transition:opacity .15s}
.tab:hover .tab-edit{opacity:1}

/* Cards & Layout */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem 1.25rem;margin-bottom:1rem;box-shadow:var(--shadow)}
.card-title{font-size:13px;font-weight:600;color:var(--fg2);margin-bottom:.75rem;display:flex;align-items:center;gap:6px}
.card-title .edit-label{background:none;border:none;cursor:pointer;color:var(--fg3);font-size:11px;padding:0 0 0 4px;opacity:0;transition:opacity .15s}
.card-title:hover .edit-label{opacity:1}
.grid4{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:.75rem;margin-bottom:1rem}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1rem}

/* KPI cards */
.kpi{background:var(--bg2);border-radius:var(--radius);padding:14px 16px;cursor:pointer;transition:background .15s,box-shadow .15s;position:relative;border:1px solid transparent}
.kpi:hover{background:var(--bg3);box-shadow:var(--shadow)}
.kpi.active{border-color:var(--blue);background:var(--bg3)}
.kpi-label{font-size:11px;color:var(--fg3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:4px}
.kpi-label .edit-label{background:none;border:none;cursor:pointer;color:var(--fg3);font-size:10px;padding:0;opacity:0;transition:opacity .15s}
.kpi:hover .kpi-label .edit-label{opacity:1}
.kpi-value{font-size:22px;font-weight:700;color:var(--fg)}
.kpi-sub{font-size:11px;color:var(--fg3);margin-top:2px}
.kpi-drill{position:absolute;top:8px;right:8px;font-size:10px;color:var(--blue);opacity:0;transition:opacity .15s}
.kpi:hover .kpi-drill{opacity:1}

/* Tables */
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;font-size:11px;font-weight:600;color:var(--fg3);border-bottom:2px solid var(--border);text-transform:uppercase;letter-spacing:.4px}
td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
tr.clickable{cursor:pointer;transition:background .1s}
tr.clickable:hover{background:var(--bg2)}
tr.clickable:hover td:first-child::after{content:" ↗";color:var(--blue);font-size:11px}
.tbl-wrap{overflow-x:auto}

/* Badges */
.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500}
.badge-red{background:#fee2e2;color:#991b1b}
.badge-amber{background:#fef3c7;color:#92400e}
.badge-green{background:#d1fae5;color:#065f46}
.badge-blue{background:#dbeafe;color:#1e40af}
.badge-gray{background:var(--bg3);color:var(--fg3)}

/* Charts */
.chart-wrap{position:relative;width:100%;height:220px}
.chart-wrap-tall{position:relative;width:100%;height:280px}

/* Search */
.search-bar{display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap}
.search-bar input{flex:1;min-width:200px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:7px 12px;color:var(--fg);font-size:13px}
.search-bar input:focus{outline:none;border-color:var(--blue)}

/* ── DRILL-DOWN PANEL ──────────────────────────────────────────────── */
#drill-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.25)}
#drill-overlay.open{display:block}
#drill-panel{position:fixed;right:0;top:0;bottom:0;width:var(--panel-w);background:var(--card);border-left:1px solid var(--border);z-index:201;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1);overflow:hidden}
#drill-panel.open{transform:translateX(0)}
.drill-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.drill-head-title{flex:1;font-size:14px;font-weight:600;color:var(--fg);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.drill-close{background:none;border:none;cursor:pointer;font-size:18px;color:var(--fg3);padding:0 4px}
.drill-close:hover{color:var(--fg)}
.drill-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.drill-stat{text-align:center}
.drill-stat-val{font-size:18px;font-weight:700;color:var(--fg)}
.drill-stat-lbl{font-size:10px;color:var(--fg3);text-transform:uppercase;letter-spacing:.4px}
.drill-spark{padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.drill-spark-title{font-size:11px;font-weight:600;color:var(--fg3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.drill-body{flex:1;overflow-y:auto;padding:0 0 1rem}
.drill-section{padding:10px 16px 0}
.drill-section-title{font-size:11px;font-weight:600;color:var(--fg3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.drill-table{width:100%;border-collapse:collapse;font-size:12px}
.drill-table th{text-align:left;padding:5px 8px;font-size:10px;color:var(--fg3);border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.4px;font-weight:600}
.drill-table td{padding:5px 8px;border-bottom:1px solid var(--border);vertical-align:middle}
.drill-table tr:last-child td{border-bottom:none}
.drill-table tr.anom td{background:#fff8f8}
@media(prefers-color-scheme:dark){.drill-table tr.anom td{background:#2a1414}}
.drill-footer{padding:10px 16px;border-top:1px solid var(--border);flex-shrink:0;display:flex;gap:8px}
.drill-footer .hbtn{flex:1;text-align:center}

/* ── LABEL EDIT DRAWER ─────────────────────────────────────────────── */
#label-overlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.3)}
#label-overlay.open{display:block}
#label-drawer{position:fixed;right:0;top:0;bottom:0;width:380px;background:var(--card);border-left:1px solid var(--border);z-index:301;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s cubic-bezier(.4,0,.2,1)}
#label-drawer.open{transform:translateX(0)}
.ld-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.ld-head-title{flex:1;font-size:14px;font-weight:600}
.ld-body{flex:1;overflow-y:auto;padding:1rem}
.ld-section{margin-bottom:1.25rem}
.ld-section-title{font-size:11px;font-weight:600;color:var(--fg3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:.5rem}
.ld-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.ld-row label{flex:0 0 140px;font-size:12px;color:var(--fg2)}
.ld-row input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:12px;color:var(--fg)}
.ld-row input:focus{outline:none;border-color:var(--blue)}
.ld-footer{padding:10px 16px;border-top:1px solid var(--border);display:flex;gap:8px}

/* Misc */
.empty{text-align:center;padding:3rem 1rem;color:var(--fg3);font-size:13px}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin:2rem auto;display:block}
@keyframes spin{to{transform:rotate(360deg)}}
.pill-d{background:#dbeafe;color:#1e40af}
.pill-m{background:#fef3c7;color:#92400e}
.anom-row{background:#fff8f8}
@media(prefers-color-scheme:dark){.anom-row{background:#2a1414}}
.top3-bar{height:4px;background:var(--bg3);border-radius:2px;margin-top:4px}
.top3-fill{height:4px;background:var(--blue);border-radius:2px;transition:width .4s}
</style>
</head>
<body>

<div class="header">
  <span class="logo">📡 TelecomLens</span>
  <select class="hselect" id="org-select" onchange="onOrgChange(this.value)"><option value="">All orgs</option></select>
  <select class="hselect" id="bill-select" onchange="onBillChange(this.value)"><option value="">Select bill…</option></select>
  <span class="header-sep"></span>
  <button class="hbtn" onclick="openImport()">⊕ Import PDF</button>
  <button class="hbtn" onclick="openLabelDrawer()" title="Customise labels">✎ Customise</button>
  <button id="report-btn" class="hbtn primary" style="display:none" onclick="downloadReport()" title="Download executive .docx report">&#x1F4C4; Report</button>
  <a id="chargeback-link" class="hbtn" style="display:none" href="#" target="_blank">⬇ Chargeback CSV</a>
</div>

<div class="tabs" id="tabs-bar"></div>

<div class="container" id="main-content">
  <div class="empty">
    <div class="spinner"></div>
    Loading dashboard…
  </div>
</div>

<!-- Drill-down overlay + panel -->
<div id="drill-overlay" onclick="closeDrill()"></div>
<div id="drill-panel">
  <div class="drill-head">
    <span class="drill-head-title" id="drill-title">Detail</span>
    <button class="drill-close" onclick="closeDrill()">✕</button>
  </div>
  <div class="drill-stats" id="drill-stats"></div>
  <div class="drill-spark" id="drill-spark-wrap" style="display:none">
    <div class="drill-spark-title">Trend history</div>
    <div class="chart-wrap" style="height:80px"><canvas id="drill-spark-chart"></canvas></div>
  </div>
  <div class="drill-body" id="drill-body"></div>
  <div class="drill-footer" id="drill-footer"></div>
</div>

<!-- Label edit overlay + drawer -->
<div id="label-overlay" onclick="closeLabelDrawer()"></div>
<div id="label-drawer">
  <div class="ld-head">
    <span class="ld-head-title">✎ Customise labels</span>
    <button class="drill-close" onclick="closeLabelDrawer()">✕</button>
  </div>
  <div class="ld-body" id="ld-body"></div>
  <div class="ld-footer">
    <button class="hbtn primary" onclick="saveLabels()" style="flex:1">Save changes</button>
    <button class="hbtn" onclick="resetLabels()">Reset to defaults</button>
  </div>
</div>

<script>
// ─── STATE ──────────────────────────────────────────────────────────────────
const _drillCache = new Map();
let _drillCacheKey = 0;
const S = {
  activeOrgId: null,
  activeBillId: null,
  activeTab: 'executive',
  summary: null,
  divisions: [],
  trends: [],
  topSpenders: [],
  searchTimer: null,
  subscribers: { total: 0, profiles: [] },
  tags: [],
  lifecycle: { events: [], summary: {} },
  budgetVsActual: [],
  forecast: null,
  alertBreaches: [],
  alerts: [],
  annotations: [],
  auditLog: [],
  webhooks: [],
  carriers: [],
  drillSparkChart: null,
  charts: {},
};

// ─── LABEL SYSTEM ────────────────────────────────────────────────────────────
const DEFAULT_LABELS = {
  // tabs
  'tab.executive':   'Executive',
  'tab.finance':     'Finance',
  'tab.ict':         'ICT',
  'tab.operations':  'Operations',
  'tab.trends':      'Trends',
  'tab.subscribers': 'Subscribers',
  'tab.budget':      'Budget & Forecast',
  // kpi cards
  'kpi.total_spend':     'Total Spend',
  'kpi.subscribers':     'Subscribers',
  'kpi.anomalies':       'Anomalies',
  'kpi.outstanding':     'Outstanding',
  'kpi.pre_tax':         'Pre-Tax Total',
  'kpi.excise':          'Excise Duty',
  'kpi.vat':             'VAT',
  'kpi.top_division':    'Top Division',
  // section headings
  'section.division_breakdown': 'Spend by Division',
  'section.charge_components':  'Charge Components',
  'section.tax_recon':          'Tax Reconciliation',
  'section.chargeback':         'Chargeback Register',
  'section.subscriber_search':  'Subscriber Search',
  'section.anomaly_tracker':    'Anomaly Tracker',
  'section.trend_overview':     'Spend Trend',
  'section.top_spenders':       'Top Spenders',
  'section.division_trend':     'Division Trend',
  // subscriber management
  'section.sub_registry':       'Subscriber Registry',
  'section.lifecycle':          'Lifecycle Events',
  'section.tag_manager':        'Tag Manager',
  // budget & forecast
  'section.bva':                'Budget vs Actual',
  'section.forecast':           'Spend Forecast',
  'section.alerts':             'Spend Alerts',
  'section.benchmarks':         'Cost-per-Head Benchmarks',
  // reporting & export
  'tab.reporting':              'Reports & Export',
  'section.report_builder':     'Custom Report Builder',
  'section.annotations':        'Annotations',
  'section.excel_packs':        'Division Excel Packs',
  // data & integrations
  'tab.integrations':           'Data & Integrations',
  'section.audit_log':          'Audit Trail',
  'section.webhooks':           'Webhooks',
  'section.carriers':           'Carrier Detection',
};

const LABEL_META = [
  { group: 'Tab names', keys: ['tab.executive','tab.finance','tab.ict','tab.operations','tab.trends'] },
  { group: 'KPI card titles', keys: ['kpi.total_spend','kpi.subscribers','kpi.anomalies','kpi.outstanding','kpi.pre_tax','kpi.excise','kpi.vat','kpi.top_division'] },
  { group: 'Section headings', keys: ['section.division_breakdown','section.charge_components','section.tax_recon','section.chargeback','section.subscriber_search','section.anomaly_tracker','section.trend_overview','section.top_spenders','section.division_trend'] },
  { group: 'Subscriber Management', keys: ['tab.subscribers','section.sub_registry','section.lifecycle','section.tag_manager'] },
  { group: 'Budget & Forecast', keys: ['tab.budget','section.bva','section.forecast','section.alerts','section.benchmarks'] },
  { group: 'Reports & Export', keys: ['tab.reporting','section.report_builder','section.annotations','section.excel_packs'] },
  { group: 'Data & Integrations', keys: ['tab.integrations','section.audit_log','section.webhooks','section.carriers'] },
];

function loadLabels() {
  try { return { ...DEFAULT_LABELS, ...JSON.parse(localStorage.getItem('tl_labels') || '{}') }; }
  catch { return { ...DEFAULT_LABELS }; }
}
function lbl(key) {
  const labels = loadLabels();
  return labels[key] || DEFAULT_LABELS[key] || key;
}
function saveLabels() {
  const inputs = document.querySelectorAll('#ld-body input[data-key]');
  const labels = {};
  inputs.forEach(inp => { if (inp.value.trim()) labels[inp.dataset.key] = inp.value.trim(); });
  localStorage.setItem('tl_labels', JSON.stringify(labels));
  closeLabelDrawer();
  renderTabs();
  if (S.summary) renderTab(S.activeTab);
}
function resetLabels() {
  if (!confirm('Reset all labels to defaults?')) return;
  localStorage.removeItem('tl_labels');
  closeLabelDrawer();
  renderTabs();
  if (S.summary) renderTab(S.activeTab);
}
function openLabelDrawer() {
  const labels = loadLabels();
  const body = document.getElementById('ld-body');
  body.innerHTML = LABEL_META.map(group => `
    <div class="ld-section">
      <div class="ld-section-title">${group.group}</div>
      ${group.keys.map(k => `
        <div class="ld-row">
          <label>${DEFAULT_LABELS[k]}</label>
          <input data-key="${k}" value="${escH(labels[k] || DEFAULT_LABELS[k])}" placeholder="${escH(DEFAULT_LABELS[k])}">
        </div>`).join('')}
    </div>`).join('');
  document.getElementById('label-overlay').classList.add('open');
  document.getElementById('label-drawer').classList.add('open');
}
function closeLabelDrawer() {
  document.getElementById('label-overlay').classList.remove('open');
  document.getElementById('label-drawer').classList.remove('open');
}

// ─── DRILL-DOWN ──────────────────────────────────────────────────────────────
let drillSparkInst = null;

async function openDrill(params) {
  if (!S.activeBillId) return;
  const { by, value, title } = params;
  document.getElementById('drill-title').textContent = title;
  document.getElementById('drill-stats').innerHTML = '<div class="spinner"></div>';
  document.getElementById('drill-body').innerHTML = '';
  document.getElementById('drill-spark-wrap').style.display = 'none';
  document.getElementById('drill-footer').innerHTML = '';
  document.getElementById('drill-overlay').classList.add('open');
  document.getElementById('drill-panel').classList.add('open');

  const url = `/api/bills/${S.activeBillId}/drilldown?by=${encodeURIComponent(by)}&value=${encodeURIComponent(value||'')}`;
  const data = await apiFetch(url);
  if (!data) { closeDrill(); return; }

  // Stats bar
  const pct = S.summary ? ((data.total_amount / S.summary.account_total) * 100).toFixed(1) : '–';
  document.getElementById('drill-stats').innerHTML = `
    <div class="drill-stat"><div class="drill-stat-val">KES ${fmtN(data.total_amount)}</div><div class="drill-stat-lbl">Total</div></div>
    <div class="drill-stat"><div class="drill-stat-val">${data.count}</div><div class="drill-stat-lbl">Lines</div></div>
    <div class="drill-stat"><div class="drill-stat-val">${pct}%</div><div class="drill-stat-lbl">of Bill</div></div>`;

  // Sparkline
  if (data.history && data.history.length > 1) {
    document.getElementById('drill-spark-wrap').style.display = '';
    const ctx = document.getElementById('drill-spark-chart').getContext('2d');
    if (drillSparkInst) drillSparkInst.destroy();
    drillSparkInst = new Chart(ctx, {
      type: 'line',
      data: {
        labels: data.history.map(h => h.date),
        datasets: [{ data: data.history.map(h => h.amount), borderColor: '#2563eb',
                     backgroundColor: 'rgba(37,99,235,.08)', tension: .35, fill: true,
                     pointRadius: 3, pointHoverRadius: 5 }],
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false },
        tooltip: { callbacks: { label: ctx => 'KES ' + fmtN(ctx.raw) } } },
        scales: { x: { ticks: { font: { size: 10 }, maxRotation: 0 } },
                  y: { ticks: { font: { size: 10 }, callback: v => fmtN(v) } } } },
    });
  }

  // Top 3 contributors
  const top3 = [...data.lines].sort((a,b) => b.amount_due_kes - a.amount_due_kes).slice(0, 3);
  const maxAmt = top3[0]?.amount_due_kes || 1;
  const top3html = top3.length ? `
    <div class="drill-section">
      <div class="drill-section-title">Top contributors</div>
      ${top3.map(l => `
        <div style="margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;font-size:12px">
            <span style="color:var(--fg);font-weight:500">${escH(l.raw_name || l.subscriber_number)}</span>
            <span style="color:var(--blue);font-weight:600">KES ${fmtN(l.amount_due_kes)}</span>
          </div>
          <div class="top3-bar"><div class="top3-fill" style="width:${Math.round((l.amount_due_kes/maxAmt)*100)}%"></div></div>
          <div style="font-size:11px;color:var(--fg3)">${escH(l.division)} · ${escH(l.tariff_plan||'')}</div>
        </div>`).join('')}
    </div>` : '';

  // Full line-items table
  const anomCount = data.lines.filter(l => l.is_anomaly).length;
  document.getElementById('drill-body').innerHTML = top3html + `
    <div class="drill-section" style="margin-top:${top3.length ? '8px':'0'}">
      <div class="drill-section-title" style="display:flex;justify-content:space-between">
        <span>Line items (${data.count})</span>
        ${anomCount ? `<span class="badge badge-red">${anomCount} anomalies</span>` : ''}
      </div>
      <table class="drill-table">
        <thead><tr><th>Name / Number</th><th>Division</th><th style="text-align:right">KES</th><th>CDRs</th></tr></thead>
        <tbody>${data.lines.map(l => `
          <tr class="${l.is_anomaly ? 'anom':''}" onclick="openDrillSub('${escH(l.subscriber_number)}','${escH(l.raw_name)}')" style="cursor:pointer">
            <td>
              <div style="font-weight:500;color:var(--fg)">${escH(l.raw_name)}</div>
              <div style="font-size:11px;color:var(--fg3)">${escH(l.subscriber_number)}</div>
              ${l.is_anomaly ? `<div style="font-size:10px;color:#dc2626">${escH(l.anomaly_reason)}</div>` : ''}
            </td>
            <td><span class="badge badge-blue" style="font-size:10px">${escH(l.division)}</span></td>
            <td style="text-align:right;font-weight:600;color:var(--blue)">${fmtN(l.amount_due_kes)}</td>
            <td style="color:var(--fg3)">${l.cdr_count}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;

  // Footer
  const _ck = ++_drillCacheKey;
  _drillCache.set(_ck, data);
  document.getElementById('drill-footer').innerHTML = `
    <button class="hbtn" onclick="exportDrillCSV(${_ck})">⬇ Export CSV</button>
    <button class="hbtn" onclick="closeDrill()">Close</button>`;
}

function openDrillSub(subNum, subName) {
  closeDrill();
  setTimeout(() => openDrill({ by: 'subscriber', value: subNum, title: subName }), 80);
}

function closeDrill() {
  document.getElementById('drill-overlay').classList.remove('open');
  document.getElementById('drill-panel').classList.remove('open');
}

function exportDrillCSV(cacheKey) {
  const data = _drillCache.get(cacheKey);
  if (!data) { alert('Export data not available — please re-open the drill panel.'); return; }
  const rows = [['Subscriber Number','Name','Division','Tariff Plan','Pre-Tax','Excise','VAT','Amount (KES)','CDR Count','Anomaly','Reason']];
  data.lines.forEach(l => rows.push([l.subscriber_number, l.raw_name, l.division, l.tariff_plan,
    l.pre_tax, l.excise, l.vat, l.amount_due_kes, l.cdr_count, l.is_anomaly?'Yes':'', l.anomaly_reason||'']));
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = `drilldown_${data.by}_${data.value||'all'}.csv`;
  a.click();
}

// ─── API HELPERS ─────────────────────────────────────────────────────────────
async function apiFetch(url) {
  try { const r = await fetch(url); if (!r.ok) return null; return await r.json(); }
  catch { return null; }
}

// ─── LOAD DATA ───────────────────────────────────────────────────────────────
async function loadOrgs() {
  const orgs = await apiFetch('/api/orgs') || [];
  const sel = document.getElementById('org-select');
  sel.innerHTML = '<option value="">All orgs</option>';
  orgs.forEach(o => sel.insertAdjacentHTML('beforeend', `<option value="${o.id}">${escH(o.name)}</option>`));
  if (orgs.length === 1) { sel.value = orgs[0].id; S.activeOrgId = orgs[0].id; }
}

async function loadBills(orgId) {
  const url = '/api/bills' + (orgId ? `?org_id=${orgId}` : '');
  const bills = await apiFetch(url) || [];
  const sel = document.getElementById('bill-select');
  sel.innerHTML = '<option value="">Select bill…</option>';
  bills.forEach(b => sel.insertAdjacentHTML('beforeend',
    `<option value="${b.id}">${escH(b.statement_date)} — ${escH(b.filename)}</option>`));
  if (bills.length) { sel.value = bills[0].id; S.activeBillId = bills[0].id; }
}

async function loadBillData(billId) {
  [S.summary, S.divisions] = await Promise.all([
    apiFetch(`/api/bills/${billId}/summary`),
    apiFetch(`/api/bills/${billId}/divisions`),
  ]);
  const rBtn = document.getElementById('report-btn');
  const cbLink = document.getElementById('chargeback-link');
  if (S.summary) {
    cbLink.href = `/api/bills/${billId}/chargeback.csv`;
    cbLink.style.display = '';
    rBtn.style.display = '';
    rBtn.dataset.billId = billId;
  } else {
    cbLink.style.display = 'none';
    rBtn.style.display = 'none';
  }
}

async function loadTrends() {
  S.trends = await apiFetch('/api/trends' + (S.activeOrgId ? `?org_id=${S.activeOrgId}` : '')) || [];
}
async function loadTopSpenders() {
  S.topSpenders = await apiFetch('/api/trends/top-spenders' + (S.activeOrgId ? `?org_id=${S.activeOrgId}` : '')) || [];
}

// ─── EVENTS ──────────────────────────────────────────────────────────────────
async function onOrgChange(orgId) {
  S.activeOrgId = orgId;
  await loadBills(orgId);
  if (S.activeBillId) await loadBillData(S.activeBillId);
  renderTab(S.activeTab);
}
async function onBillChange(billId) {
  S.activeBillId = billId ? parseInt(billId) : null;
  if (S.activeBillId) await loadBillData(S.activeBillId);
  renderTab(S.activeTab);
}
function switchTab(tab) {
  if (tab !== S.activeTab) closeDrill();
  S.activeTab = tab;
  renderTabs();
  renderTab(tab);
}

// ─── TABS ─────────────────────────────────────────────────────────────────────
function renderTabs() {
  const tabs = [
    { id: 'executive', labelKey: 'tab.executive' },
    { id: 'finance',   labelKey: 'tab.finance' },
    { id: 'ict',       labelKey: 'tab.ict' },
    { id: 'operations',labelKey: 'tab.operations' },
    { id: 'trends',    labelKey: 'tab.trends' },
    { id: 'subscribers', labelKey: 'tab.subscribers' },
    { id: 'budget',      labelKey: 'tab.budget' },
    { id: 'reporting',   labelKey: 'tab.reporting' },
    { id: 'integrations',labelKey: 'tab.integrations' },
  ];
  document.getElementById('tabs-bar').innerHTML = tabs.map(t => `
    <div class="tab ${S.activeTab === t.id ? 'active' : ''}" onclick="switchTab('${t.id}')">
      ${escH(lbl(t.labelKey))}
    </div>`).join('');
}

// ─── TAB RENDERER ────────────────────────────────────────────────────────────
function renderTab(tab) {
  destroyCharts();
  const el = document.getElementById('main-content');
  if (!S.summary || !S.activeBillId) {
    el.innerHTML = '<div class="empty">No bill loaded — import a PDF or select a bill above.</div>';
    return;
  }
  if (tab === 'executive')  el.innerHTML = renderExecutive();
  if (tab === 'finance')    el.innerHTML = renderFinance();
  if (tab === 'ict')        { el.innerHTML = renderICT(); loadSubscribers(S.activeBillId, '', ''); return; }
  if (tab === 'operations') { el.innerHTML = renderOperations(); loadAnomalies(S.activeBillId); return; }
  if (tab === 'trends')     { el.innerHTML = renderTrends(); loadTrends().then(() => loadTopSpenders()).then(renderTrendsCharts); return; }
  if (tab === 'subscribers') { el.innerHTML = renderSubscribers(); loadSubscriberRegistry(); return; }
  if (tab === 'budget')      { el.innerHTML = renderBudget(); loadBudgetData(); return; }
  if (tab === 'reporting')   { el.innerHTML = renderReporting(); loadReportingData(); return; }
  if (tab === 'integrations'){ el.innerHTML = renderIntegrations(); loadIntegrationsData(); return; }
  requestAnimationFrame(() => initTabCharts(tab));
}

function destroyCharts() {
  Object.values(S.charts).forEach(c => { try { c.destroy(); } catch {} });
  S.charts = {};
}

function renderTrendsCharts() {
  const t = S.trends;
  if (!t.length) return;

  // Total spend chart - bars are clickable
  const ctx1 = document.getElementById('trend-total-chart')?.getContext('2d');
  if (ctx1) {
    S.charts.trendTotal = new Chart(ctx1, {
      type: 'bar',
      data: {
        labels: t.map(b => b.statement_date),
        datasets: [{ label: 'Total Spend (KES)', data: t.map(b => b.account_total),
                     backgroundColor: 'rgba(37,99,235,.7)', borderRadius: 4 }],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        onClick: (evt, els) => {
          if (!els.length) return;
          const b = t[els[0].index];
          if (b && S.activeBillId) openDrill({ by: 'division', value: '', title: `All lines — ${b.statement_date}` });
        },
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => 'KES ' + fmtN(ctx.raw) } } },
        scales: { y: { ticks: { callback: v => fmtN(v) } } },
      },
    });
  }

  // Division trend (stacked)
  const allDivs = [...new Set(t.flatMap(b => Object.keys(b.divisions || {})))];
  const COLOURS = ['#2563eb','#0d9488','#d97706','#dc2626','#7c3aed','#16a34a','#f59e0b','#6366f1'];
  const ctx2 = document.getElementById('trend-div-chart')?.getContext('2d');
  if (ctx2) {
    S.charts.trendDiv = new Chart(ctx2, {
      type: 'bar',
      data: {
        labels: t.map(b => b.statement_date),
        datasets: allDivs.map((div, i) => ({
          label: div,
          data: t.map(b => (b.divisions || {})[div] || 0),
          backgroundColor: COLOURS[i % COLOURS.length] + 'cc',
          borderRadius: 2,
        })),
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        onClick: (evt, els) => {
          if (!els.length) return;
          const ds = S.charts.trendDiv.data.datasets[els[0].datasetIndex];
          if (ds) openDrill({ by: 'division', value: ds.label, title: `Division: ${ds.label}` });
        },
        plugins: { legend: { position: 'bottom', labels: { font: { size: 10 }, boxWidth: 10, padding: 8 } },
                   tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': KES ' + fmtN(ctx.raw) } } },
        scales: { x: { stacked: true }, y: { stacked: true, ticks: { callback: v => fmtN(v) } } },
      },
    });
  }

  // Subscribers + anomalies
  const ctx3 = document.getElementById('trend-subs-chart')?.getContext('2d');
  if (ctx3) {
    S.charts.trendSubs = new Chart(ctx3, {
      type: 'line',
      data: {
        labels: t.map(b => b.statement_date),
        datasets: [
          { label: 'Subscribers', data: t.map(b => b.subscriber_count),
            borderColor: '#2563eb', backgroundColor: 'rgba(37,99,235,.08)', tension: .3, fill: true, yAxisID: 'y' },
          { label: 'Anomalies', data: t.map(b => b.anomaly_count),
            borderColor: '#dc2626', backgroundColor: 'rgba(220,38,38,.1)', tension: .3, fill: true, yAxisID: 'y1' },
        ],
      },
      options: {
        responsive: true, maintainAspectRatio: false,

// ─── CHART INIT ──────────────────────────────────────────────────────────────
function initTabCharts(tab) {
  if (tab === 'executive') {
    const divCtx = document.getElementById('exec-div-chart')?.getContext('2d');
    const COLOURS = ['#2563eb','#0d9488','#d97706','#dc2626','#7c3aed','#16a34a','#f59e0b','#6366f1'];
    if (divCtx && S.divisions.length) {
      S.charts.execDiv = new Chart(divCtx, {
        type: 'doughnut',
        data: { labels: S.divisions.map(d => d.division),
                datasets: [{ data: S.divisions.map(d => d.total),
                             backgroundColor: COLOURS.map(c => c + 'cc'), borderWidth: 1 }] },
        options: {
          responsive: true, maintainAspectRatio: false,
          onClick: (evt, els) => {
            if (!els.length) return;
            const div = S.divisions[els[0].index];
            if (div) openDrill({ by: 'division', value: div.division, title: 'Division: ' + div.division });
          },
          plugins: { legend: { position: 'bottom', labels: { font: { size: 11 }, boxWidth: 10, padding: 8 } },
                     tooltip: { callbacks: { label: ctx => ctx.label + ': KES ' + fmtN(ctx.raw) } } },
        },
      });
    }
    const chargeCtx = document.getElementById('exec-charge-chart')?.getContext('2d');
    if (chargeCtx && S.summary) {
      const s = S.summary;
      S.charts.execCharge = new Chart(chargeCtx, {
        type: 'bar',
        data: {
          labels: ['Pre-Tax', 'Excise (15%)', 'VAT (16%)', 'Outstanding'],
          datasets: [{ data: [s.pre_tax_total, s.excise_total, s.vat_total, s.outstanding_total],
                       backgroundColor: ['#2563ebcc','#d97706cc','#0d9488cc','#dc2626cc'], borderRadius: 4 }],
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          onClick: (evt, els) => {
            if (!els.length) return;
            const labels = ['pre_tax','excise','vat','outstanding'];
            openDrill({ by: 'division', value: '', title: labels[els[0].index] + ' — all lines' });
          },
          indexAxis: 'y',
          plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => 'KES ' + fmtN(ctx.raw) } } },
          scales: { x: { ticks: { callback: v => fmtN(v) } } },
        },
      });
    }
  }
}

// ─── IMPORT ──────────────────────────────────────────────────────────────────
function openImport() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.pdf'; input.multiple = true;
  input.onchange = async () => {
    for (const file of input.files) {
      const fd = new FormData(); fd.append('file', file);
      const r = await fetch('/api/bills/upload', { method: 'POST', body: fd });
      const data = await r.json();
      console.log('Uploaded', file.name, data);
    }
    await loadOrgs();
    await loadBills(S.activeOrgId);
    if (S.activeBillId) await loadBillData(S.activeBillId);
    renderTab(S.activeTab);
  };
  input.click();
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function fmtN(n) {
  if (n == null || isNaN(n)) return '0';
  return Number(n).toLocaleString('en-KE', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
}
function escH(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function kpiCard(labelKey, value, sub, drillBy, drillValue, drillHint) {
  return `<div class="kpi" onclick="openDrill({by:'${drillBy}',value:'${escH(drillValue)}',title:'${escH(lbl(labelKey))}'})">
    <div class="kpi-label">${escH(lbl(labelKey))}</div>
    <div class="kpi-value">${value}</div>
    ${sub ? `<div class="kpi-sub">${sub}</div>` : ''}
    <div class="kpi-drill">▼ ${drillHint||'drill down'}</div>
  </div>`;
}
function secTitle(key) {
  return `${escH(lbl(key))} <button class="edit-label" onclick="event.stopPropagation();promptRename('${key}')" title="Rename section">✎</button>`;
}
function promptRename(key) {
  const cur = lbl(key);
  const val = prompt(`Rename "${cur}" to:`, cur);
  if (val && val.trim()) {
    const labels = loadLabels();
    labels[key] = val.trim();
    localStorage.setItem('tl_labels', JSON.stringify(labels));
    renderTabs();
    renderTab(S.activeTab);
  }
}

    apiFetch(`/api/orgs/${S.activeOrgId}/tags`),
    apiFetch(`/api/orgs/${S.activeOrgId}/lifecycle`),
  ]);
  S.subscribers = subData || { total: 0, profiles: [] };
  S.tags = tags || [];
  S.lifecycle = lifecycle || { events: [], summary: {} };

  body.innerHTML = `

function debounceSubSearch(q) {
  clearTimeout(S.searchTimer);
  S.searchTimer = setTimeout(async () => {
    if (!S.activeOrgId) return;
    const div = document.getElementById('sreg-div')?.value || '';
    const tag = document.getElementById('sreg-tag')?.value || '';
    const data = await apiFetch(`/api/orgs/${S.activeOrgId}/subscribers?limit=80&search=${encodeURIComponent(q)}&division=${encodeURIComponent(div)}&tag=${encodeURIComponent(tag)}`);
    if (data) {
      S.subscribers = data;
      const tbody = document.getElementById('sreg-tbody');
      if (tbody) tbody.innerHTML = data.profiles.map(p => subRegistryRow(p)).join('');
    }
  }, 300);
}

async function filterSubDiv(div) {
  if (!S.activeOrgId) return;
  const q = document.getElementById('sreg-search')?.value || '';
  const data = await apiFetch(`/api/orgs/${S.activeOrgId}/subscribers?limit=80&search=${encodeURIComponent(q)}&division=${encodeURIComponent(div)}`);
  if (data) { S.subscribers = data; const tbody = document.getElementById('sreg-tbody'); if (tbody) tbody.innerHTML = data.profiles.map(p => subRegistryRow(p)).join(''); }
}

async function filterSubTag(tag) {
  if (!S.activeOrgId) return;
  const q = document.getElementById('sreg-search')?.value || '';
  const data = await apiFetch(`/api/orgs/${S.activeOrgId}/subscribers?limit=80&search=${encodeURIComponent(q)}&tag=${encodeURIComponent(tag)}`);
  if (data) { S.subscribers = data; const tbody = document.getElementById('sreg-tbody'); if (tbody) tbody.innerHTML = data.profiles.map(p => subRegistryRow(p)).join(''); }
}

function filterAndShowTag(tag) {
  _subView = 'registry';
  document.getElementById('svbtn-registry').className = 'hbtn primary';
  document.getElementById('svbtn-tags').className = 'hbtn';
  renderSubRegistry();
  setTimeout(() => {
    const sel = document.getElementById('sreg-tag');
    if (sel) { sel.value = tag; filterSubTag(tag); }
  }, 50);
}

  const body = {
    display_name: document.getElementById('se-name').value.trim(),
    division_override: document.getElementById('se-div').value.trim(),
    tags: document.getElementById('se-tags').value.trim(),
    device_type: document.getElementById('se-device').value,
    tariff_override: document.getElementById('se-tariff').value.trim(),
    notes: document.getElementById('se-notes').value.trim(),
  };
  const r = await fetch(`/api/orgs/${S.activeOrgId}/subscribers/${encodeURIComponent(subNum)}`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  document.getElementById('sub-edit-modal')?.remove();
  if (r.ok) { await loadSubscriberRegistry(); }
  else alert('Save failed. Please try again.');
}

function openBulkTagger() {
  const tag = prompt('Enter a tag to apply to all currently-filtered subscribers:', '');
  if (!tag || !tag.trim()) return;
  const profiles = S.subscribers.profiles || [];
  if (!profiles.length) { alert('No subscribers in current view.'); return; }
  if (!confirm(`Apply tag "${tag.trim()}" to ${profiles.length} subscribers?`)) return;
  Promise.all(profiles.map(p => {
    const existingTags = (p.tags || '').split(',').map(t => t.trim()).filter(Boolean);
    if (existingTags.includes(tag.trim())) return Promise.resolve();
    const newTags = [...existingTags, tag.trim()].join(', ');
    return fetch(`/api/orgs/${S.activeOrgId}/subscribers/${encodeURIComponent(p.subscriber_number)}`, {
      method: 'PATCH', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ tags: newTags }),
    });
  })).then(() => loadSubscriberRegistry());
}

function exportSubscribersCSV() {
  const profiles = S.subscribers.profiles || [];
  if (!profiles.length) { alert('No data to export.'); return; }
  const rows = [['Number','Display Name','Division','Tags','Device','Tariff','Latest KES','First Seen','Last Seen']];
  profiles.forEach(p => rows.push([p.subscriber_number, p.display_name, p.division,
    p.tags, p.device_type, p.latest_tariff||p.tariff_override, p.latest_amount_kes, p.first_seen_date, p.last_seen_date]));
  const csv = rows.map(r => r.map(v => `"${String(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'subscribers.csv'; a.click();
}

async function loadBudgetData() {
  if (!S.activeOrgId) return;
  const [bva, forecast, breaches, alerts] = await Promise.all([

    apiFetch(`/api/orgs/${S.activeOrgId}/forecast`),

    apiFetch(`/api/orgs/${S.activeOrgId}/alerts`),
  ]);
  S.budgetVsActual = bva || [];

            <td><input type="number" data-div="${escH(div)}" data-period="${escH(period)}" data-field="headcount"
                 style="width:80px;background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:4px 8px;font-size:12px;color:var(--fg)"

      </div>

}

async function saveBudgetEdits() {
  const modal = document.getElementById('budget-editor-modal');
  const rows = {};
  modal.querySelectorAll('input[data-div]').forEach(inp => {
    const key = inp.dataset.div + '|' + inp.dataset.period;
    if (!rows[key]) rows[key] = { division: inp.dataset.div, period: inp.dataset.period };
    rows[key][inp.dataset.field] = parseFloat(inp.value) || 0;
  });
  await Promise.all(Object.values(rows).map(row =>
    fetch(`/api/orgs/${S.activeOrgId}/budgets`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(row),
    })
  ));
  modal.remove();
  await loadBudgetData();
}

function openBudgetImport() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.csv';
  input.onchange = async () => {
    const fd = new FormData(); fd.append('file', input.files[0]);
    const r = await fetch(`/api/orgs/${S.activeOrgId}/budgets/import-csv`, { method: 'POST', body: fd });
    const data = await r.json();
    alert(`Imported ${data.imported} budget rows.${data.errors.length ? '\n\nErrors:\n' + data.errors.join('\n') : ''}`);
    await loadBudgetData();
  };
  input.click();
}

function downloadBudgetTemplate() {
  const divisions = [...new Set((S.budgetVsActual.flatMap(p => p.divisions.map(d => d.division))))].sort();
  const periods = [...new Set(S.budgetVsActual.map(p => p.period))].sort();
  const rows = [['division','period','budget_kes','headcount']];
  divisions.forEach(div => periods.forEach(period => rows.push([div, period, '', ''])));
  const csv = rows.map(r => r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'budget_template.csv'; a.click();
}

    <div class="grid3" style="margin-bottom:12px">
      <div class="kpi">
        <div class="kpi-label">Trend</div>
        <div class="kpi-value" style="color:${trendColor}">${trendDir}</div>

      <div class="card-title">${secTitle('section.forecast')}</div>

        <thead><tr><th>Period</th><th style="text-align:right">Predicted (KES)</th><th style="text-align:right">Lower bound</th><th style="text-align:right">Upper bound</th><th>Type</th></tr></thead>
        <tbody>
          ${fc.history.map(h => `<tr>
            <td>${escH(h.period)}</td>

          ${fc.forecast.map(f => `<tr style="background:var(--bg2)">
            <td><strong>${escH(f.period)}</strong></td>
            <td style="text-align:right;font-weight:600;color:var(--blue)">${fmtN(f.predicted_kes)}</td>
            <td style="text-align:right;color:var(--fg3)">${fmtN(f.lower_kes)}</td>
            <td style="text-align:right;color:var(--fg3)">${fmtN(f.upper_kes)}</td>
            <td><span class="badge badge-amber" style="font-size:10px">Forecast</span></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;

  requestAnimationFrame(() => {
    const ctx = document.getElementById('forecast-chart')?.getContext('2d');
    if (!ctx) return;
    const history = fc.history || [];
    const forecast = fc.forecast || [];
    const allLabels = [...history.map(h => h.period), ...forecast.map(f => f.period)];
    const actualData = [...history.map(h => h.actual_kes), ...forecast.map(() => null)];
    const trendData = [...history.map(h => h.trend_kes), ...forecast.map(f => f.predicted_kes)];
    const upperData = [...history.map(() => null), ...forecast.map(f => f.upper_kes)];
    const lowerData = [...history.map(() => null), ...forecast.map(f => f.lower_kes)];
    S.charts.forecast = new Chart(ctx, {
      type: 'line',
      data: {
        labels: allLabels,
        datasets: [
          { label: 'Actual', data: actualData, borderColor: '#2563eb', backgroundColor: 'rgba(37,99,235,.08)',
            fill: true, tension: 0.2, pointRadius: 4 },
          { label: 'Trend / Forecast', data: trendData, borderColor: '#d97706', borderDash: [5,3],
            fill: false, tension: 0, pointRadius: 3 },

        scales: { y: { ticks: { callback: v => fmtN(v) } } },
      },

async function saveAlert() {

  await fetch(`/api/orgs/${S.activeOrgId}/alerts`, {

  S.alerts = alerts || [];

async function deleteAlert(alertId) {

    apiFetch(`/api/orgs/${S.activeOrgId}/alert-breaches`),

  S.alerts = alerts || [];
  renderAlertsView();
}

async function buildAndDownloadReport() {
  if (!S.activeBillId) return;
  const sections = ['include_summary','include_tax','include_divisions',
    'include_subscribers','include_anomalies','include_trends','include_annotations'];
  const body = { top_n_subscribers: parseInt(document.getElementById('rp-top-n')?.value) || 15 };
  sections.forEach(id => {
    const el = document.getElementById('rp-' + id);
    body[id] = el ? el.checked : true;
  });
  const checkedDivs = [...document.querySelectorAll('#rp-div-filters input[type=checkbox]:checked')]
    .map(el => el.dataset.div).filter(Boolean);
  if (checkedDivs.length) body.divisions_filter = checkedDivs;

  const btn = document.querySelector('[onclick="buildAndDownloadReport()"]');
  const orig = btn?.innerHTML;
  if (btn) { btn.innerHTML = '⏳ Generating…'; btn.disabled = true; }

  try {
    const resp = await fetch(`/api/bills/${S.activeBillId}/report-custom.docx`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!resp.ok) { const e = await resp.json().catch(() => ({})); throw new Error(e.detail || `HTTP ${resp.status}`); }
    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const cd = resp.headers.get('Content-Disposition') || '';
    const m = cd.match(/filename="?([^"]+)"?/);
    a.download = m ? m[1] : `TelecomLens_custom.docx`;
    a.href = url;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch (err) {
    alert('Report generation failed:\n' + err.message);
  } finally {
    if (btn) { btn.innerHTML = orig; btn.disabled = false; }
  }
}

async function downloadChargebackExcel() {
  if (!S.activeBillId) return;
  const btn = document.querySelector('[onclick="downloadChargebackExcel()"]');
  const orig = btn?.innerHTML;
  if (btn) { btn.innerHTML = '⏳ Building…'; btn.disabled = true; }
  try {
    const resp = await fetch(`/api/bills/${S.activeBillId}/chargeback-excel.xlsx`);
    if (!resp.ok) { const e = await resp.json().catch(() => ({})); throw new Error(e.detail || `HTTP ${resp.status}`); }
    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const cd = resp.headers.get('Content-Disposition') || '';
    const m = cd.match(/filename="?([^"]+)"?/);
    a.download = m ? m[1] : `chargeback.xlsx`;
    a.href = url;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch (err) {
    alert('Excel export failed:\n' + err.message + '\n\nMake sure openpyxl is installed:\n  pip install openpyxl');
  } finally {
    if (btn) { btn.innerHTML = orig; btn.disabled = false; }
  }
}

    apiFetch(`/api/health/carriers`),
  ]);
  S.auditLog = audit || [];
  S.webhooks = webhooks || [];
  S.carriers = carriers || [];
  renderAuditLog();
}

// ── Audit Trail ───────────────────────────────────────────────────────────────
function renderAuditLog() {
  const body = document.getElementById('int-view-body');
  if (!body) return;
  const log = S.auditLog || [];
  const ACTION_ICONS = {
    'bill.import': '📥', 'report.export': '📄', 'report.excel': '📊',
    'annotation.add': '💬', 'annotation.delete': '🗑',
    'webhook.add': '🔗', 'webhook.delete': '🗑',
    'subscriber.update': '✏️', 'budget.set': '💰',
  };
  body.innerHTML = `
  <div class="card">
    <div class="card-title" style="display:flex;justify-content:space-between">
      <span>${secTitle('section.audit_log')} (${log.length} recent)</span>
      <button class="hbtn" onclick="loadMoreAudit()">Load more</button>
    </div>
    ${log.length ? `
    <div class="tbl-wrap">
    <table>
      <thead><tr><th>Action</th><th>Detail</th><th>Actor</th><th>Timestamp</th></tr></thead>
      <tbody>${log.map(e => {
        const icon = ACTION_ICONS[e.action] || '📋';
        const [cat, sub] = e.action.split('.');
        const badgeClass = cat === 'bill' ? 'badge-blue' : cat === 'report' ? 'badge-green' :
                           cat === 'annotation' ? 'badge-amber' : 'badge-gray';
        return `<tr>
          <td>
            <span class="badge ${badgeClass}" style="font-size:10px">${icon} ${escH(e.action)}</span>
          </td>
          <td style="font-size:12px;color:var(--fg2);max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escH(e.detail)}</td>
          <td style="font-size:12px;color:var(--fg3)">${escH(e.actor)}</td>
          <td style="font-size:12px;color:var(--fg3);white-space:nowrap">${escH(e.created_at)}</td>
        </tr>`;
      }).join('')}
      </tbody>
    </table>
    </div>` : `<div class="empty">No audit events yet. Actions like bill imports, report exports, and subscriber updates will appear here.</div>`}
  </div>`;
}

async function loadMoreAudit() {
  if (!S.activeOrgId) return;
  const more = await apiFetch(`/api/orgs/${S.activeOrgId}/audit-log?limit=200`);
  if (more) { S.auditLog = more; renderAuditLog(); }
}

// ── Webhooks view ─────────────────────────────────────────────────────────────
function renderWebhooksView() {
  const body = document.getElementById('int-view-body');
  if (!body) return;
  const hooks = S.webhooks || [];

  body.innerHTML = `
  <div class="card">
    <div class="card-title" style="display:flex;justify-content:space-between">
      <span>${secTitle('section.webhooks')} (${hooks.length})</span>
      <button class="hbtn primary" onclick="openAddWebhook()">+ Add webhook</button>
    </div>
    <div style="font-size:12px;color:var(--fg3);margin-bottom:12px">
      After each successful bill import, TelecomLens POSTs a JSON payload to configured URLs.
      Optionally set a secret to receive an HMAC-SHA256 signature in <code>X-TelecomLens-Signature</code>.
    </div>
    ${hooks.length ? `
    <div class="tbl-wrap">
    <table>
      <thead><tr><th>URL</th><th>Events</th><th>Last Fired</th><th>Status</th><th></th></tr></thead>
      <tbody>${hooks.map(h => `<tr>
        <td style="font-size:12px;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escH(h.url)}</td>
        <td><span class="badge badge-blue" style="font-size:10px">${escH(h.events)}</span></td>
        <td style="font-size:12px;color:var(--fg3)">${escH(h.last_fired || '—')}</td>
        <td><span class="badge ${h.is_active ? 'badge-green' : 'badge-gray'}" style="font-size:10px">${h.is_active ? 'Active' : 'Paused'}</span></td>
        <td style="display:flex;gap:4px;flex-wrap:nowrap">
          <button class="hbtn" style="padding:3px 8px;font-size:11px" onclick="testWebhook(${h.id})">Test</button>
          <button class="hbtn" style="padding:3px 8px;font-size:11px;color:var(--coral)" onclick="deleteWebhook(${h.id})">✕</button>
        </td>
      </tr>`).join('')}
      </tbody>
    </table>
    </div>` : `<div class="empty">No webhooks configured. Add one to push bill data to Slack, Power BI, or your ERP after each import.</div>`}
    <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border)">
      <div style="font-size:12px;font-weight:600;color:var(--fg2);margin-bottom:6px">Payload example</div>
      <pre style="background:var(--bg2);border-radius:6px;padding:10px;font-size:11px;color:var(--fg2);overflow-x:auto">{
  "event": "bill.imported",
  "org_id": "acc001",
  "bill_id": 12,
  "statement_date": "2026-03",
  "account_total": 125000.00,
  "subscriber_count": 45
}</pre>
    </div>
  </div>`;
}

function openAddWebhook() {
  const modal = document.createElement('div');
  modal.id = 'wh-modal';
  modal.style.cssText = 'position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center';
  modal.innerHTML = `
    <div style="background:var(--card);border-radius:var(--radius);padding:20px;width:460px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,.2)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <strong>Add Webhook</strong>
        <button class="drill-close" onclick="document.getElementById('wh-modal').remove()">✕</button>
      </div>
      <div class="ld-row" style="margin-bottom:10px">
        <label style="flex:0 0 110px;font-size:12px">URL</label>
        <input id="wh-url" style="flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-size:12px;color:var(--fg)" placeholder="https://hooks.example.com/…">
      </div>
      <div class="ld-row" style="margin-bottom:10px">
        <label style="flex:0 0 110px;font-size:12px">Secret <span style="color:var(--fg3)">(optional)</span></label>
        <input id="wh-secret" type="password" style="flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-size:12px;color:var(--fg)" placeholder="Leave blank if not needed">
      </div>
      <div style="display:flex;gap:8px;margin-top:16px">
        <button class="hbtn primary" style="flex:1" onclick="saveWebhook()">Add webhook</button>
        <button class="hbtn" onclick="document.getElementById('wh-modal').remove()">Cancel</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

async function saveWebhook() {
  const url = document.getElementById('wh-url')?.value.trim();
  const secret = document.getElementById('wh-secret')?.value.trim();
  if (!url || !url.startsWith('http')) { alert('Please enter a valid URL.'); return; }
  await fetch(`/api/orgs/${S.activeOrgId}/webhooks`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ url, secret, events: 'bill.imported' }),
  });
  document.getElementById('wh-modal')?.remove();
  S.webhooks = await apiFetch(`/api/orgs/${S.activeOrgId}/webhooks`) || [];
  renderWebhooksView();
}

async function deleteWebhook(whId) {
  if (!confirm('Remove this webhook?')) return;
  await fetch(`/api/orgs/${S.activeOrgId}/webhooks/${whId}`, { method: 'DELETE' });
  S.webhooks = await apiFetch(`/api/orgs/${S.activeOrgId}/webhooks`) || [];
  renderWebhooksView();
}

async function testWebhook(whId) {
  const btn = event.target;
  const orig = btn.innerHTML;
  btn.innerHTML = '⏳'; btn.disabled = true;
  const r = await fetch(`/api/orgs/${S.activeOrgId}/webhooks/${whId}/test`, { method: 'POST' });
  const data = await r.json().catch(() => ({}));
  btn.innerHTML = orig; btn.disabled = false;
  if (r.ok && data.ok) {
    alert(`Test successful — server returned HTTP ${data.status}`);
  } else {
    alert(`Test failed:\n${data.detail || JSON.stringify(data)}`);
  }
}

      <tbody>${carriers.map(c => {

// ─── REPORT DOWNLOAD ──────────────────────────────────────────────────────────
async function downloadReport() {
  const btn = document.getElementById('report-btn');
  const billId = btn.dataset.billId || S.activeBillId;
  if (!billId) return;
  const orig = btn.innerHTML;
  btn.innerHTML = '⏳ Generating…';
  btn.disabled = true;
  try {
    const resp = await fetch(`/api/bills/${billId}/report.docx`);
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ detail: 'Unknown error' }));
      throw new Error(err.detail || `HTTP ${resp.status}`);
    }
    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    // Get filename from Content-Disposition header if available
    const cd = resp.headers.get('Content-Disposition') || '';
    const match = cd.match(/filename="?([^"]+)"?/);
    a.download = match ? match[1] : `TelecomLens_report_${billId}.docx`;
    a.href = url;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch (err) {
    alert('Report generation failed:\n' + err.message + '\n\nMake sure python-docx is installed:\n  pip install python-docx');
  } finally {
    btn.innerHTML = orig;
    btn.disabled = false;
  }
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────
(async function boot() {
  renderTabs();
  document.getElementById('main-content').innerHTML = '<div class="spinner"></div>';
  await loadOrgs();
  await loadBills(S.activeOrgId);
  if (S.activeBillId) await loadBillData(S.activeBillId);
  renderTab(S.activeTab);
  requestAnimationFrame(() => initTabCharts(S.activeTab));
})();
</script>
